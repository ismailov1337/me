<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Draw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }

#container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #080810; }

#video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  opacity: 0.22;
  filter: saturate(0.4) brightness(0.7);
}

#drawCanvas, #overlayCanvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}

/* ── Loading ── */
#loading {
  position: absolute; inset: 0;
  background: #080810;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 22px; z-index: 100;
  font-family: 'Courier New', monospace;
}
#loading h1 {
  font-size: 36px; letter-spacing: .35em; font-weight: 400;
  background: linear-gradient(135deg, #00ffcc 0%, #ff3cac 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#loading p { font-size: 12px; letter-spacing: .18em; color: rgba(255,255,255,.35); text-transform: uppercase; }
.ring {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.08);
  border-top-color: #00ffcc;
  animation: spin .9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── HUD bottom ── */
#hud {
  position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 14px;
  z-index: 20; pointer-events: none;
  font-family: 'Courier New', monospace;
}
#gesture-pill {
  background: rgba(8,8,16,0.82);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 100px;
  padding: 7px 22px;
  font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
  color: rgba(255,255,255,.65);
  transition: color .25s, border-color .25s;
  white-space: nowrap;
}

/* ── Color palette ── */
#palette {
  position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 10px; z-index: 20;
  background: rgba(8,8,16,0.75);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 18px; padding: 12px 8px;
}
.swatch {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.15);
  cursor: pointer; transition: transform .15s, border-color .2s;
  pointer-events: all;
}
.swatch.active { border-color: #fff; transform: scale(1.35); }

/* ── Gesture legend ── */
#legend {
  position: absolute; right: 20px; top: 20px;
  background: rgba(8,8,16,0.78);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px; padding: 14px 18px;
  font-family: 'Courier New', monospace;
  font-size: 11px; color: rgba(255,255,255,.55);
  line-height: 2.1; z-index: 20; pointer-events: none;
}
#legend .lh { color: rgba(255,255,255,.25); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 4px; }

/* ── Flash overlay ── */
#flash {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 30;
  font-family: 'Courier New', monospace;
  font-size: 52px; color: #fff; letter-spacing: .06em; text-transform: uppercase;
  text-shadow: 0 0 40px rgba(255,255,255,.5);
  opacity: 0; transition: opacity .35s;
}

/* ── Size indicator ── */
#size-ring {
  position: absolute; bottom: 72px; left: 50%; transform: translateX(-50%);
  pointer-events: none; z-index: 20; opacity: 0; transition: opacity .3s;
  font-family: 'Courier New', monospace; font-size: 11px; color: rgba(255,255,255,.4);
  letter-spacing: .12em; text-transform: uppercase; text-align: center;
}
</style>
</head>
<body>
<div id="container">

  <div id="loading">
    <h1>AIR DRAW</h1>
    <div class="ring"></div>
    <p id="load-msg">Requesting camera…</p>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="drawCanvas"></canvas>
  <canvas id="overlayCanvas"></canvas>

  <div id="palette">
    <!-- filled by JS -->
  </div>

  <div id="legend">
    <div class="lh">Gestures</div>
    <div>☝️ &nbsp;1 finger — Draw</div>
    <div>✌️ &nbsp;2 fingers — Erase</div>
    <div>🖐 &nbsp;Open hand — Pause</div>
    <div>👊 &nbsp;Fist (hold) — Clear all</div>
  </div>

  <div id="hud">
    <div id="gesture-pill">Show your hand ✋</div>
  </div>

  <div id="flash"></div>
  <div id="size-ring"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const COLORS = [
  { hex: '#00ffcc', name: 'Mint' },
  { hex: '#ff3cac', name: 'Pink' },
  { hex: '#ffd700', name: 'Gold' },
  { hex: '#4fc3f7', name: 'Sky' },
  { hex: '#ff6b35', name: 'Fire' },
  { hex: '#b388ff', name: 'Violet' },
  { hex: '#ffffff', name: 'White' },
];

// Smoothing: lower α = more smoothing (but lag), higher = responsive (but jittery)
// We use a dual-pass: heavy smooth for drawing, light for cursor display
const SMOOTH_DRAW   = 0.28;  // very smooth draw path
const SMOOTH_CURSOR = 0.55;  // more responsive cursor display
const MIN_DIST      = 2.0;   // px: minimum movement to add a new point
const FIST_HOLD     = 22;    // frames to hold fist for clear
const ERASE_RADIUS  = 28;

// ═══════════════════════════════════════════════════════════════
//  CANVAS + OFFSCREEN SETUP
// ═══════════════════════════════════════════════════════════════
const drawCanvas    = document.getElementById('drawCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const dctx = drawCanvas.getContext('2d');
const octx = overlayCanvas.getContext('2d');

// Offscreen canvas: committed strokes are baked here so redrawAll is O(1) not O(n)
let offscreen    = document.createElement('canvas');
let offCtx       = offscreen.getContext('2d');

let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  drawCanvas.width = overlayCanvas.width = offscreen.width = W;
  drawCanvas.height = overlayCanvas.height = offscreen.height = H;
  // Redraw baked content after resize (resize clears canvas)
  dctx.drawImage(offscreen, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); });

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let colorIdx    = 0;
let currentColor = COLORS[0].hex;
let brushSize   = 6;
let mode        = 'idle';   // 'draw' | 'erase' | 'idle' | 'fist'

// Smoothed positions — two separate smoothers
let drawPos   = null;   // heavy smooth — what gets drawn
let cursorPos = null;   // light smooth — cursor display

// Live stroke (not yet baked)
let liveStroke  = null;   // { pts: [{x,y}], color, size }

// Fist counter
let fistFrames  = 0;

// Gesture stability: only switch gesture after N consistent frames
let pendingGesture   = null;
let pendingFrames    = 0;
const GESTURE_STABLE = 3;  // frames a gesture must hold before activating

let activeGesture = 'NONE';

// ═══════════════════════════════════════════════════════════════
//  PALETTE UI
// ═══════════════════════════════════════════════════════════════
const paletteEl = document.getElementById('palette');
COLORS.forEach((c, i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i === 0 ? ' active' : '');
  sw.style.background = c.hex;
  sw.style.boxShadow  = `0 0 10px ${c.hex}55`;
  sw.title = c.name;
  sw.addEventListener('click', () => { selectColor(i); });
  paletteEl.appendChild(sw);
});

function selectColor(i) {
  colorIdx = i;
  currentColor = COLORS[i].hex;
  document.querySelectorAll('.swatch').forEach((s, j) => s.classList.toggle('active', j === i));
  flash('🎨');
}

// ═══════════════════════════════════════════════════════════════
//  SMOOTHING
// ═══════════════════════════════════════════════════════════════
function lerp(a, b, t) { return a + (b - a) * t; }

function smooth(prev, next, alpha) {
  if (!prev) return { x: next.x, y: next.y };
  return { x: lerp(prev.x, next.x, alpha), y: lerp(prev.y, next.y, alpha) };
}

// Convert normalized landmark to mirrored screen coords
function lmToScreen(lm) {
  return { x: (1 - lm.x) * W, y: lm.y * H };
}

// ═══════════════════════════════════════════════════════════════
//  CATMULL-ROM SMOOTH STROKE RENDERING
// ═══════════════════════════════════════════════════════════════
function catmullRomSegment(ctx, p0, p1, p2, p3, alpha) {
  // Centripetal Catmull-Rom
  function dist(a, b) { return Math.hypot(b.x-a.x, b.y-a.y); }
  const t0 = 0;
  const t1 = t0 + Math.pow(dist(p0, p1), alpha);
  const t2 = t1 + Math.pow(dist(p1, p2), alpha);
  const t3 = t2 + Math.pow(dist(p2, p3), alpha);

  // Convert to cubic bezier control points (approximate)
  const t = 0.5;
  const d1 = t2 - t1;
  if (d1 < 0.001) { ctx.lineTo(p2.x, p2.y); return; }

  const cp1x = p1.x + (p2.x - p0.x) / 6 * t * d1;
  const cp1y = p1.y + (p2.y - p0.y) / 6 * t * d1;
  const cp2x = p2.x - (p3.x - p1.x) / 6 * t * d1;
  const cp2y = p2.y - (p3.y - p1.y) / 6 * t * d1;

  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
}

function renderSmooth(ctx, pts, color, size, glow) {
  if (!pts || pts.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = color;
  ctx.lineWidth = size;

  if (glow) {
    ctx.shadowColor = color;
    ctx.shadowBlur  = size * 2.5;
  }

  ctx.beginPath();

  if (pts.length === 2) {
    ctx.moveTo(pts[0].x, pts[0].y);
    ctx.lineTo(pts[1].x, pts[1].y);
  } else {
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[Math.max(i - 1, 0)];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[Math.min(i + 2, pts.length - 1)];
      if (i === 0) ctx.moveTo(p1.x, p1.y);
      catmullRomSegment(ctx, p0, p1, p2, p3, 0.5);
    }
  }
  ctx.stroke();
  ctx.restore();
}

function renderEraser(ctx, pts, size) {
  if (!pts || pts.length < 2) return;
  ctx.save();
  ctx.globalCompositeOperation = 'destination-out';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = size;
  ctx.strokeStyle = 'rgba(0,0,0,1)';
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const mx = (pts[i-1].x + pts[i].x) / 2;
    const my = (pts[i-1].y + pts[i].y) / 2;
    ctx.quadraticCurveTo(pts[i-1].x, pts[i-1].y, mx, my);
  }
  ctx.stroke();
  ctx.restore();
}

// Bake the live stroke onto the offscreen canvas
function bakeStroke() {
  if (!liveStroke || liveStroke.pts.length < 2) { liveStroke = null; return; }
  if (liveStroke.isEraser) {
    renderEraser(offCtx, liveStroke.pts, liveStroke.size);
  } else {
    renderSmooth(offCtx, liveStroke.pts, liveStroke.color, liveStroke.size, true);
  }
  liveStroke = null;
}

// Full composite: offscreen + live stroke
function compositeFrame() {
  dctx.clearRect(0, 0, W, H);
  dctx.drawImage(offscreen, 0, 0);
  if (liveStroke && liveStroke.pts.length >= 2) {
    if (liveStroke.isEraser) {
      // Preview erase on a temp canvas then subtract
      const tmp = document.createElement('canvas');
      tmp.width = W; tmp.height = H;
      const tctx = tmp.getContext('2d');
      tctx.drawImage(offscreen, 0, 0);
      renderEraser(tctx, liveStroke.pts, liveStroke.size);
      dctx.clearRect(0, 0, W, H);
      dctx.drawImage(tmp, 0, 0);
    } else {
      renderSmooth(dctx, liveStroke.pts, liveStroke.color, liveStroke.size, true);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  GESTURE CLASSIFICATION
// ═══════════════════════════════════════════════════════════════
function fingerUp(lms, tip, pip) {
  return lms[tip].y < lms[pip].y - 0.025;
}

function countUp(lms) {
  let c = 0;
  if (fingerUp(lms, 8, 6))  c++;
  if (fingerUp(lms, 12, 10)) c++;
  if (fingerUp(lms, 16, 14)) c++;
  if (fingerUp(lms, 20, 18)) c++;
  return c;
}

function isFist(lms) {
  return !fingerUp(lms, 8, 6)  && !fingerUp(lms, 12, 10) &&
         !fingerUp(lms, 16, 14) && !fingerUp(lms, 20, 18);
}

function classify(lms) {
  if (isFist(lms)) return 'FIST';
  const n = countUp(lms);
  if (n === 1) return 'DRAW';
  if (n === 2) return 'ERASE';
  if (n >= 4)  return 'IDLE';
  return 'IDLE';
}

// Stabilise: only commit gesture after GESTURE_STABLE consecutive frames
function getStableGesture(raw) {
  if (raw === pendingGesture) {
    pendingFrames++;
    if (pendingFrames >= GESTURE_STABLE) return raw;
  } else {
    pendingGesture = raw;
    pendingFrames  = 1;
  }
  return activeGesture; // keep current until stable
}

// ═══════════════════════════════════════════════════════════════
//  OVERLAY RENDERING  (hand skeleton + cursor)
// ═══════════════════════════════════════════════════════════════
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],[0,17]
];

function drawOverlay(lms, gesture, curPos) {
  octx.clearRect(0, 0, W, H);
  if (!lms) return;

  // skeleton
  octx.save();
  octx.strokeStyle = 'rgba(255,255,255,0.18)';
  octx.lineWidth = 1;
  CONNECTIONS.forEach(([a,b]) => {
    const pa = lmToScreen(lms[a]), pb = lmToScreen(lms[b]);
    octx.beginPath(); octx.moveTo(pa.x, pa.y); octx.lineTo(pb.x, pb.y); octx.stroke();
  });

  // fingertip dots
  [4, 8, 12, 16, 20].forEach(i => {
    const p = lmToScreen(lms[i]);
    octx.beginPath(); octx.arc(p.x, p.y, i===8?5.5:3.5, 0, Math.PI*2);
    octx.fillStyle = i===8 ? currentColor : 'rgba(255,255,255,0.35)';
    if (i===8) { octx.shadowColor=currentColor; octx.shadowBlur=12; }
    else { octx.shadowBlur=0; }
    octx.fill();
  });
  octx.restore();

  if (!curPos) return;

  // Cursor ring
  octx.save();
  const isErase = gesture === 'ERASE';
  const r = isErase ? ERASE_RADIUS : brushSize * 1.8 + 6;
  const col = isErase ? '#ff4444' : currentColor;
  octx.beginPath();
  octx.arc(curPos.x, curPos.y, r, 0, Math.PI*2);
  octx.strokeStyle = col;
  octx.lineWidth = isErase ? 1.5 : 2;
  octx.shadowColor = col;
  octx.shadowBlur = 14;
  octx.globalAlpha = 0.85;
  octx.stroke();

  // Inner dot
  octx.beginPath();
  octx.arc(curPos.x, curPos.y, 3, 0, Math.PI*2);
  octx.fillStyle = col;
  octx.shadowBlur = 6;
  octx.globalAlpha = 1;
  octx.fill();

  // Fist progress arc
  if (gesture === 'FIST' && fistFrames > 0) {
    const prog = Math.min(fistFrames / FIST_HOLD, 1);
    octx.beginPath();
    octx.arc(curPos.x, curPos.y, 46, -Math.PI/2, -Math.PI/2 + prog * Math.PI*2);
    octx.strokeStyle = '#ff4444';
    octx.lineWidth = 3.5;
    octx.shadowColor = '#ff4444';
    octx.shadowBlur = 8;
    octx.globalAlpha = 0.9;
    octx.stroke();
  }
  octx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  FLASH FEEDBACK
// ═══════════════════════════════════════════════════════════════
const flashEl  = document.getElementById('flash');
let flashTimer = null;
function flash(msg) {
  flashEl.textContent = msg;
  flashEl.style.opacity = '1';
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { flashEl.style.opacity = '0'; }, 800);
}

// ═══════════════════════════════════════════════════════════════
//  GESTURE PILL
// ═══════════════════════════════════════════════════════════════
const gesturePill = document.getElementById('gesture-pill');
function setPill(txt, col) {
  gesturePill.textContent = txt;
  gesturePill.style.color = col || 'rgba(255,255,255,.65)';
  gesturePill.style.borderColor = col ? col + '55' : 'rgba(255,255,255,.12)';
}

// ═══════════════════════════════════════════════════════════════
//  MAIN RESULTS HANDLER
// ═══════════════════════════════════════════════════════════════
function onResults(results) {
  const lmsList = results.multiHandLandmarks;

  if (!lmsList || !lmsList.length) {
    bakeStroke();
    drawPos = cursorPos = null;
    fistFrames = 0;
    activeGesture = 'NONE';
    pendingGesture = null; pendingFrames = 0;
    octx.clearRect(0, 0, W, H);
    setPill('Show your hand ✋');
    compositeFrame();
    return;
  }

  const lms = results.multiHandLandmarks[0];
  const rawTip = lmToScreen(lms[8]);  // index fingertip, raw

  // Update both smoothers
  drawPos   = smooth(drawPos,   rawTip, SMOOTH_DRAW);
  cursorPos = smooth(cursorPos, rawTip, SMOOTH_CURSOR);

  const rawGesture  = classify(lms);
  const gesture     = getStableGesture(rawGesture);
  activeGesture     = gesture;

  // ── DRAW ─────────────────────────────────────────────────────
  if (gesture === 'DRAW') {
    fistFrames = 0;
    if (!liveStroke) {
      liveStroke = { pts: [{ x: drawPos.x, y: drawPos.y }], color: currentColor, size: brushSize, isEraser: false };
    } else {
      const last = liveStroke.pts[liveStroke.pts.length - 1];
      const d = Math.hypot(drawPos.x - last.x, drawPos.y - last.y);
      if (d >= MIN_DIST) {
        liveStroke.pts.push({ x: drawPos.x, y: drawPos.y });
        // Segment long strokes for performance
        if (liveStroke.pts.length > 600) {
          bakeStroke();
          liveStroke = { pts: [{ x: drawPos.x, y: drawPos.y }], color: currentColor, size: brushSize, isEraser: false };
        }
      }
    }
    compositeFrame();
    setPill('✏️  Drawing', currentColor);

  // ── ERASE ────────────────────────────────────────────────────
  } else if (gesture === 'ERASE') {
    fistFrames = 0;
    if (liveStroke && !liveStroke.isEraser) { bakeStroke(); }

    if (!liveStroke) {
      liveStroke = { pts: [{ x: drawPos.x, y: drawPos.y }], color: null, size: ERASE_RADIUS * 2, isEraser: true };
    } else {
      const last = liveStroke.pts[liveStroke.pts.length - 1];
      if (Math.hypot(drawPos.x - last.x, drawPos.y - last.y) >= MIN_DIST) {
        liveStroke.pts.push({ x: drawPos.x, y: drawPos.y });
        if (liveStroke.pts.length > 200) { bakeStroke(); }
      }
    }
    compositeFrame();
    setPill('✌️  Erasing', '#ff4444');

  // ── FIST — clear ─────────────────────────────────────────────
  } else if (gesture === 'FIST') {
    if (liveStroke) { bakeStroke(); }
    fistFrames++;
    if (fistFrames >= FIST_HOLD) {
      offCtx.clearRect(0, 0, W, H);
      dctx.clearRect(0, 0, W, H);
      fistFrames = 0;
      flash('🗑  CLEARED');
      setPill('🗑  Cleared');
    } else {
      const pct = Math.round((fistFrames / FIST_HOLD) * 100);
      setPill(`👊  Hold to clear… ${pct}%`, '#ff4444');
      compositeFrame();
    }

  // ── IDLE (open hand / nothing) ────────────────────────────────
  } else {
    if (liveStroke) { bakeStroke(); compositeFrame(); }
    fistFrames = 0;
    setPill('🖐  Open — hover');
  }

  drawOverlay(lms, gesture, cursorPos);
}

// ═══════════════════════════════════════════════════════════════
//  SIZE CONTROL via keyboard / wheel
// ═══════════════════════════════════════════════════════════════
const sizeRingEl = document.getElementById('size-ring');
let sizeRingTimer = null;

function setSize(s) {
  brushSize = Math.max(2, Math.min(28, s));
  sizeRingEl.textContent = `Brush: ${brushSize}px`;
  sizeRingEl.style.opacity = '1';
  clearTimeout(sizeRingTimer);
  sizeRingTimer = setTimeout(() => { sizeRingEl.style.opacity = '0'; }, 1200);
}

document.addEventListener('keydown', e => {
  if (e.key === ']' || e.key === '+') setSize(brushSize + 2);
  if (e.key === '[' || e.key === '-') setSize(brushSize - 2);
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) { /* undo noop — strokes baked */ }
  // Number keys 1-7 → colors
  const n = parseInt(e.key);
  if (n >= 1 && n <= COLORS.length) selectColor(n - 1);
});

document.addEventListener('wheel', e => {
  e.preventDefault();
  setSize(brushSize + (e.deltaY < 0 ? 2 : -2));
}, { passive: false });

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════
const loadEl  = document.getElementById('loading');
const loadMsg = document.getElementById('load-msg');

async function boot() {
  loadMsg.textContent = 'Requesting camera…';

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
  } catch(e) {
    loadMsg.textContent = '❌ Camera denied — please allow and reload';
    return;
  }

  const video = document.getElementById('video');
  video.srcObject = stream;
  await new Promise(r => { video.onloadedmetadata = r; });
  video.play();

  loadMsg.textContent = 'Loading hand tracking…';

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.78,
    minTrackingConfidence: 0.72,
  });

  hands.onResults(onResults);

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720
  });

  camera.start();

  await new Promise(r => setTimeout(r, 1400));
  loadEl.style.transition = 'opacity .6s';
  loadEl.style.opacity = '0';
  setTimeout(() => { loadEl.style.display = 'none'; }, 600);
}

boot();
</script>
</body>
</html>
