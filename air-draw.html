<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Draw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', system-ui, sans-serif; }

#app { position: relative; width: 100vw; height: 100vh; }

/* ── Video bg ── */
#video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  opacity: 0.28;
}

/* ── Canvases ── */
#drawCanvas, #overlayCanvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
#overlayCanvas { pointer-events: none; }

/* ── TOP BAR ── */
#topbar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 60px;
  background: rgba(10,10,20,0.82);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; z-index: 30;
}
.logo {
  font-size: 18px; font-weight: 700; letter-spacing: .06em;
  color: #fff; opacity: .9;
}
.logo span { color: #4ade80; }

/* Color swatches */
#colors {
  display: flex; align-items: center; gap: 8px;
}
.sw {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.2);
  cursor: pointer; transition: transform .15s, border-color .15s;
  flex-shrink: 0;
}
.sw:hover { transform: scale(1.15); }
.sw.active {
  border-color: #fff;
  transform: scale(1.3);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
}

/* Size slider */
#size-wrap {
  display: flex; align-items: center; gap: 8px;
}
#size-label { font-size: 11px; color: rgba(255,255,255,.4); letter-spacing:.08em; }
#sizeSlider {
  -webkit-appearance: none;
  width: 80px; height: 3px;
  border-radius: 2px; outline: none;
  background: rgba(255,255,255,.2);
}
#sizeSlider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: #fff; cursor: pointer;
}

/* Action buttons */
.act-btn {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.75);
  font-size: 12px; letter-spacing: .06em;
  padding: 6px 14px; border-radius: 8px;
  cursor: pointer; transition: background .15s, color .15s;
}
.act-btn:hover { background: rgba(255,255,255,.15); color: #fff; }
.act-btn.danger:hover { background: rgba(255,60,60,.25); color: #ff6b6b; border-color: #ff6b6b55; }

/* ── GESTURE HUD — bottom center ── */
#hud {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 30; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
#mode-badge {
  padding: 8px 24px; border-radius: 100px;
  font-size: 13px; letter-spacing: .1em; font-weight: 600;
  text-transform: uppercase;
  background: rgba(10,10,20,0.85);
  border: 1.5px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.5);
  transition: color .25s, border-color .25s, background .25s;
  white-space: nowrap;
}
#mode-badge.drawing {
  color: #4ade80; border-color: #4ade8055;
  background: rgba(74,222,128,0.08);
}
#mode-badge.erasing {
  color: #f87171; border-color: #f8717155;
  background: rgba(248,113,113,0.08);
}
#mode-badge.idle {
  color: rgba(255,255,255,.35);
}

/* ── Gesture guide — top-right corner ── */
#guide {
  position: absolute; top: 72px; right: 16px;
  background: rgba(10,10,20,0.78);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px; padding: 14px 16px;
  z-index: 30; pointer-events: none;
  font-size: 12px; line-height: 2.0;
  color: rgba(255,255,255,.5);
}
#guide .gh { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: rgba(255,255,255,.25); margin-bottom: 4px; }
.gr { display: flex; align-items: center; gap: 10px; }
.gi { width: 22px; text-align: center; font-size: 15px; }
.gt { font-size: 11px; }

/* ── Flash ── */
#flash {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 38px; font-weight: 700; letter-spacing: .08em;
  color: #fff; text-shadow: 0 0 30px rgba(255,255,255,.4);
  pointer-events: none; z-index: 40;
  opacity: 0; transition: opacity .3s;
}

/* ── Loading ── */
#loading {
  position: absolute; inset: 0;
  background: #0d0d1a;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; z-index: 100;
}
#loading .logo2 { font-size: 32px; font-weight: 700; letter-spacing: .2em; color: #fff; }
#loading .logo2 span { color: #4ade80; }
.ring { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,.08); border-top-color: #4ade80; animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#lmsg { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.3); }

/* ── Fist clear ring ── */
#clearProgress {
  position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
  pointer-events: none; z-index: 35;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  opacity: 0; transition: opacity .2s;
}
#clearProgress svg { transform: rotate(-90deg); }
#clearProgress span { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: #f87171; }
</style>
</head>
<body>
<div id="app">

  <!-- Loading -->
  <div id="loading">
    <div class="logo2">Air<span>Draw</span></div>
    <div class="ring"></div>
    <div id="lmsg">Starting camera…</div>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="drawCanvas"></canvas>
  <canvas id="overlayCanvas"></canvas>

  <!-- Top bar -->
  <div id="topbar">
    <div class="logo">Air<span>Draw</span></div>

    <div id="colors"></div>

    <div id="size-wrap">
      <span id="size-label">SIZE</span>
      <input type="range" id="sizeSlider" min="2" max="30" value="6">
    </div>

    <div style="display:flex;gap:8px;">
      <button class="act-btn" id="undoBtn">↩ Undo</button>
      <button class="act-btn danger" id="clearBtn">✕ Clear</button>
    </div>
  </div>

  <!-- Gesture guide -->
  <div id="guide">
    <div class="gh">Hand gestures</div>
    <div class="gr"><span class="gi">✌️</span><span class="gt">2 fingers — Draw</span></div>
    <div class="gr"><span class="gi">🤟</span><span class="gt">3 fingers — Erase</span></div>
    <div class="gr"><span class="gi">🖐</span><span class="gt">Open hand — Pause</span></div>
    <div class="gr"><span class="gi">👊</span><span class="gt">Fist (hold) — Clear all</span></div>
  </div>

  <!-- Mode badge -->
  <div id="hud">
    <div id="mode-badge" class="idle">✋ Show your hand</div>
  </div>

  <!-- Fist clear progress -->
  <div id="clearProgress">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="24" fill="none" stroke="rgba(248,113,113,0.15)" stroke-width="4"/>
      <circle id="clearArc" cx="28" cy="28" r="24" fill="none" stroke="#f87171" stroke-width="4"
        stroke-linecap="round" stroke-dasharray="150.8" stroke-dashoffset="150.8"
        style="transition:stroke-dashoffset .05s linear"/>
    </svg>
    <span>Hold to clear</span>
  </div>

  <div id="flash"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
<script>
// ══════════════════════════════════════════════════════
// COLORS & STATE
// ══════════════════════════════════════════════════════
const PALETTE = [
  '#ffffff','#f87171','#fb923c','#facc15',
  '#4ade80','#38bdf8','#818cf8','#f472b6',
];
let colorIdx   = 0;
let drawColor  = PALETTE[0];
let brushSize  = 6;

// Gesture stability
let pendingG  = null, pendingN = 0;
const STABLE  = 4;  // frames before gesture commits
let activeG   = 'NONE';

// Smoothing
let srawX = null, srawY = null;  // heavy smooth (draw path)
let scurX = null, scurY = null;  // light smooth (cursor ring)
const DALPHA = 0.3;
const CALPHA = 0.6;

// Strokes
let strokes = [];        // committed [{pts,color,size,isErase}]
let live    = null;      // current stroke being built
const MIN_D = 1.8;

// Offscreen baked canvas
const offscreen = document.createElement('canvas');
const offCtx    = offscreen.getContext('2d');

// Fist
let fistN = 0;
const FIST_HOLD = 24;

// ══════════════════════════════════════════════════════
// CANVAS SETUP
// ══════════════════════════════════════════════════════
const drawCanvas    = document.getElementById('drawCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const dctx = drawCanvas.getContext('2d');
const octx = overlayCanvas.getContext('2d');

let W, H;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  drawCanvas.width = overlayCanvas.width = offscreen.width = W;
  drawCanvas.height = overlayCanvas.height = offscreen.height = H;
  composite();
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════════════════
// PALETTE UI
// ══════════════════════════════════════════════════════
const colorsEl = document.getElementById('colors');
PALETTE.forEach((c, i) => {
  const el = document.createElement('div');
  el.className = 'sw' + (i===0?' active':'');
  el.style.background = c;
  if (c === '#ffffff') el.style.border = '2.5px solid rgba(255,255,255,0.5)';
  el.addEventListener('click', () => pickColor(i));
  colorsEl.appendChild(el);
});

function pickColor(i) {
  colorIdx  = i;
  drawColor = PALETTE[i];
  document.querySelectorAll('.sw').forEach((s,j) => s.classList.toggle('active', j===i));
}

document.getElementById('sizeSlider').addEventListener('input', e => { brushSize = +e.target.value; });
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('clearBtn').addEventListener('click', clearAll);

// ══════════════════════════════════════════════════════
// SMOOTH LERP
// ══════════════════════════════════════════════════════
function lerpV(a, b, t) { return a + (b-a)*t; }

function updateSmooth(raw) {
  if (srawX === null) { srawX = scurX = raw.x; srawY = scurY = raw.y; return; }
  srawX = lerpV(srawX, raw.x, DALPHA);
  srawY = lerpV(srawY, raw.y, DALPHA);
  scurX = lerpV(scurX, raw.x, CALPHA);
  scurY = lerpV(scurY, raw.y, CALPHA);
}

function toScreen(lm) {
  return { x: (1-lm.x)*W, y: lm.y*H };
}

// ══════════════════════════════════════════════════════
// DRAWING HELPERS  — Catmull-Rom smooth curves
// ══════════════════════════════════════════════════════
function strokePath(ctx, pts) {
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  if (pts.length === 2) {
    ctx.lineTo(pts[1].x, pts[1].y);
  } else {
    for (let i = 1; i < pts.length-1; i++) {
      const mx = (pts[i].x + pts[i+1].x)/2;
      const my = (pts[i].y + pts[i+1].y)/2;
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
    }
    ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  }
  ctx.stroke();
}

function renderStroke(ctx, s) {
  ctx.save();
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
  if (s.isErase) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth   = s.size * 3;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = s.color;
    ctx.lineWidth   = s.size;
    ctx.shadowColor = s.color;
    ctx.shadowBlur  = s.size * 2;
  }
  strokePath(ctx, s.pts);
  ctx.restore();
}

// Bake live → offscreen
function bake() {
  if (!live || live.pts.length < 2) { live = null; return; }
  renderStroke(offCtx, live);
  live = null;
}

// Composite: offscreen + live stroke → draw canvas
function composite() {
  dctx.clearRect(0,0,W,H);
  dctx.drawImage(offscreen, 0, 0);
  if (live && live.pts.length >= 2) {
    if (live.isErase) {
      // preview erase on temp surface
      const tmp = document.createElement('canvas');
      tmp.width=W; tmp.height=H;
      const tc = tmp.getContext('2d');
      tc.drawImage(offscreen,0,0);
      renderStroke(tc, live);
      dctx.clearRect(0,0,W,H);
      dctx.drawImage(tmp,0,0);
    } else {
      renderStroke(dctx, live);
    }
  }
}

function undo() {
  // Re-bake without last stroke
  if (live) { live = null; }
  if (!strokes.length) return;
  strokes.pop();
  offCtx.clearRect(0,0,W,H);
  strokes.forEach(s => renderStroke(offCtx, s));
  composite();
}

function clearAll() {
  live = null; strokes = [];
  offCtx.clearRect(0,0,W,H);
  dctx.clearRect(0,0,W,H);
  flashMsg('Cleared');
}

// ══════════════════════════════════════════════════════
// GESTURE RECOGNITION
// ══════════════════════════════════════════════════════
function fingerUp(lms, tip, pip) {
  return lms[tip].y < lms[pip].y - 0.022;
}
function countUp(lms) {
  let c = 0;
  if (fingerUp(lms,8,6))  c++;
  if (fingerUp(lms,12,10)) c++;
  if (fingerUp(lms,16,14)) c++;
  if (fingerUp(lms,20,18)) c++;
  return c;
}
function isFist(lms) {
  return !fingerUp(lms,8,6) && !fingerUp(lms,12,10) &&
         !fingerUp(lms,16,14) && !fingerUp(lms,20,18);
}
function classify(lms) {
  if (isFist(lms)) return 'FIST';
  const n = countUp(lms);
  if (n === 2) return 'DRAW';   // ✌️ two fingers = DRAW (most natural & stable)
  if (n === 3) return 'ERASE';  // 🤟 three fingers = ERASE
  if (n >= 4)  return 'PAUSE';  // 🖐 open hand = pause
  if (n === 1) return 'PAUSE';  // single finger = ambiguous, treat as pause
  return 'NONE';
}
function stableGesture(raw) {
  if (raw === pendingG) {
    pendingN++;
    if (pendingN >= STABLE) return raw;
  } else {
    pendingG = raw; pendingN = 1;
  }
  return activeG;
}

// ══════════════════════════════════════════════════════
// MODE BADGE
// ══════════════════════════════════════════════════════
const badge = document.getElementById('mode-badge');
function setBadge(txt, cls) {
  badge.textContent = txt;
  badge.className = 'idle';
  if (cls) badge.classList.add(cls);
}

// ══════════════════════════════════════════════════════
// FLASH
// ══════════════════════════════════════════════════════
const flashEl = document.getElementById('flash');
let ft = null;
function flashMsg(txt) {
  flashEl.textContent = txt;
  flashEl.style.opacity='1';
  clearTimeout(ft);
  ft = setTimeout(()=>{ flashEl.style.opacity='0'; }, 800);
}

// ══════════════════════════════════════════════════════
// FIST CLEAR PROGRESS
// ══════════════════════════════════════════════════════
const clearProgressEl = document.getElementById('clearProgress');
const clearArc        = document.getElementById('clearArc');
const CIRC = 150.8; // 2π × 24

function setClearProgress(n) {
  const show = n > 0;
  clearProgressEl.style.opacity = show ? '1' : '0';
  const offset = CIRC * (1 - Math.min(n/FIST_HOLD,1));
  clearArc.style.strokeDashoffset = offset;
}

// ══════════════════════════════════════════════════════
// OVERLAY  — hand skeleton + cursor
// ══════════════════════════════════════════════════════
const CONN = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],[0,17]
];

function drawOverlay(lms, gesture) {
  octx.clearRect(0,0,W,H);
  if (!lms) return;

  // skeleton lines
  octx.save();
  octx.strokeStyle = 'rgba(255,255,255,0.15)';
  octx.lineWidth = 1;
  CONN.forEach(([a,b]) => {
    const pa = toScreen(lms[a]), pb = toScreen(lms[b]);
    octx.beginPath(); octx.moveTo(pa.x,pa.y); octx.lineTo(pb.x,pb.y); octx.stroke();
  });

  // fingertip dots — highlight active drawing fingers
  const activeTips = gesture==='DRAW'  ? [8,12] :
                     gesture==='ERASE' ? [8,12,16] : [];
  for (let i=0; i<21; i++) {
    const p = toScreen(lms[i]);
    const isTip = [4,8,12,16,20].includes(i);
    if (!isTip) continue;
    const isActive = activeTips.includes(i);
    octx.beginPath(); octx.arc(p.x, p.y, isActive?6:3.5, 0, Math.PI*2);
    octx.fillStyle = isActive ? drawColor : 'rgba(255,255,255,0.3)';
    octx.shadowColor = isActive ? drawColor : 'transparent';
    octx.shadowBlur  = isActive ? 14 : 0;
    octx.fill();
  }
  octx.restore();

  if (scurX === null) return;

  // Cursor ring
  octx.save();
  const isErase = gesture === 'ERASE';
  const col     = isErase ? '#f87171' : drawColor;
  const r       = isErase ? 22 : Math.max(brushSize, 5) + 8;

  octx.beginPath(); octx.arc(scurX, scurY, r, 0, Math.PI*2);
  octx.strokeStyle = col;
  octx.lineWidth   = 2;
  octx.globalAlpha = 0.85;
  octx.shadowColor = col; octx.shadowBlur = 12;
  octx.stroke();

  // center dot
  octx.beginPath(); octx.arc(scurX, scurY, 3, 0, Math.PI*2);
  octx.fillStyle = col; octx.globalAlpha = 1;
  octx.shadowBlur = 6; octx.fill();
  octx.restore();
}

// ══════════════════════════════════════════════════════
// MAIN RESULTS HANDLER
// ══════════════════════════════════════════════════════
function onResults(res) {
  const list = res.multiHandLandmarks;

  if (!list || !list.length) {
    bake();
    srawX = srawY = scurX = scurY = null;
    fistN = 0; activeG = 'NONE';
    pendingG = null; pendingN = 0;
    setBadge('✋ Show your hand', 'idle');
    setClearProgress(0);
    octx.clearRect(0,0,W,H);
    composite();
    return;
  }

  const lms = list[0];
  const rawTip = toScreen(lms[8]);
  updateSmooth(rawTip);

  const rawG  = classify(lms);
  const g     = stableGesture(rawG);
  activeG     = g;

  // ── DRAW ────────────────────────────────────────────
  if (g === 'DRAW') {
    fistN = 0; setClearProgress(0);
    if (!live || live.isErase) {
      bake();
      live = { pts:[{x:srawX,y:srawY}], color:drawColor, size:brushSize, isErase:false };
    } else {
      const last = live.pts[live.pts.length-1];
      const d = Math.hypot(srawX-last.x, srawY-last.y);
      if (d >= MIN_D) {
        live.pts.push({x:srawX,y:srawY});
        if (live.pts.length > 700) { bake(); live={pts:[{x:srawX,y:srawY}],color:drawColor,size:brushSize,isErase:false}; }
      }
    }
    setBadge('✌️  Drawing', 'drawing');
    composite();

  // ── ERASE ───────────────────────────────────────────
  } else if (g === 'ERASE') {
    fistN = 0; setClearProgress(0);
    if (!live || !live.isErase) {
      bake();
      live = { pts:[{x:srawX,y:srawY}], color:null, size:brushSize*2.5+10, isErase:true };
    } else {
      const last = live.pts[live.pts.length-1];
      const d = Math.hypot(srawX-last.x, srawY-last.y);
      if (d >= MIN_D) {
        live.pts.push({x:srawX,y:srawY});
        if (live.pts.length > 300) { bake(); live={pts:[{x:srawX,y:srawY}],color:null,size:brushSize*2.5+10,isErase:true}; }
      }
    }
    setBadge('🤟  Erasing', 'erasing');
    composite();

  // ── FIST — hold to clear ─────────────────────────────
  } else if (g === 'FIST') {
    bake(); fistN++;
    setClearProgress(fistN);
    if (fistN >= FIST_HOLD) {
      clearAll(); fistN = 0; setClearProgress(0);
    } else {
      composite();
    }
    setBadge('👊  Hold to clear…', 'erasing');

  // ── PAUSE / open hand ────────────────────────────────
  } else {
    // Finalize stroke when lifting
    if (live) { bake(); composite(); }
    fistN = 0; setClearProgress(0);
    setBadge('🖐  Hover — open hand', 'idle');
  }

  drawOverlay(lms, g);
}

// ══════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if ((e.key==='z') && (e.ctrlKey||e.metaKey)) undo();
  if (e.key==='Escape') clearAll();
  if (e.key===']' || e.key==='+') { brushSize=Math.min(30,brushSize+2); document.getElementById('sizeSlider').value=brushSize; }
  if (e.key==='[' || e.key==='-') { brushSize=Math.max(2,brushSize-2); document.getElementById('sizeSlider').value=brushSize; }
  const n = parseInt(e.key);
  if (n >= 1 && n <= PALETTE.length) pickColor(n-1);
});

// ══════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════
const loading = document.getElementById('loading');
const lmsg    = document.getElementById('lmsg');

async function boot() {
  lmsg.textContent = 'Requesting camera…';
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} }
    });
  } catch(e) {
    lmsg.textContent = '❌ Camera denied — allow camera and reload';
    return;
  }

  const vid = document.getElementById('video');
  vid.srcObject = stream;
  await new Promise(r => { vid.onloadedmetadata = r; });
  vid.play();
  lmsg.textContent = 'Loading hand model…';

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
  });
  hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.8, minTrackingConfidence:0.75 });
  hands.onResults(onResults);

  const cam = new Camera(vid, {
    onFrame: async () => { await hands.send({image:vid}); },
    width:1280, height:720
  });
  cam.start();

  await new Promise(r => setTimeout(r,1500));
  loading.style.transition = 'opacity .6s';
  loading.style.opacity = '0';
  setTimeout(()=>{ loading.style.display='none'; }, 600);
}

boot();
</script>
</body>
</html>
