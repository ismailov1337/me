<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ AR NEURAL MESH — MAX MODE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;color:#fff;overflow:hidden;user-select:none;}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
#main{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px;}
#ttl{font-size:9px;letter-spacing:0.5em;color:#1a1a1a;text-transform:uppercase;}
#wrap{position:relative;display:inline-block;border-radius:12px;overflow:hidden;box-shadow:0 0 0 1px #111, 0 0 80px rgba(0,255,255,0.04);}
#video{display:block;transform:scaleX(-1);width:720px;height:540px;object-fit:cover;}
#canvas{position:absolute;top:0;left:0;width:720px;height:540px;transform:scaleX(-1);pointer-events:none;}

.hud{position:absolute;font-size:10px;line-height:2;pointer-events:none;font-family:'Courier New',monospace;}
#htl{top:10px;left:12px;color:#0ff;text-shadow:0 0 8px #0ff;}
#htr{top:10px;right:12px;color:#f80;text-shadow:0 0 8px #f80;text-align:right;}
#hbl{bottom:26px;left:12px;color:#0f8;text-shadow:0 0 8px #0f8;}

#finger-count{
  position:absolute;top:50%;right:10px;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none;
}
.fh{display:flex;flex-direction:column;align-items:center;gap:2px;}
.fl{font-size:7px;letter-spacing:0.12em;color:#333;}
.fd{display:flex;gap:3px;}
.fdot{width:7px;height:7px;border-radius:50%;border:1px solid #1e1e1e;transition:all 0.08s;}
.fn{font-size:20px;font-weight:bold;line-height:1;text-shadow:0 0 14px currentColor;}
.fsep{width:28px;height:1px;background:#181818;margin:1px 0;}
.ftotal{font-size:26px;font-weight:bold;color:#fff;text-shadow:0 0 20px #fff;}
.ftlbl{font-size:7px;letter-spacing:0.12em;color:#2a2a2a;}

#sbar{position:absolute;bottom:0;left:0;right:0;height:22px;background:rgba(0,0,0,0.75);display:flex;align-items:center;padding:0 10px;gap:10px;font-size:9px;letter-spacing:0.12em;color:#2a2a2a;border-top:1px solid #0d0d0d;}
.sdot{width:5px;height:5px;border-radius:50%;background:#0ff;box-shadow:0 0 6px #0ff;animation:bl 1.2s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.2}}

#mode-badge{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:0.25em;padding:3px 10px;border-radius:2px;
  border:1px solid #0ff;color:#0ff;text-shadow:0 0 6px #0ff;
  box-shadow:0 0 12px rgba(0,255,255,0.1);background:rgba(0,0,0,0.5);
  pointer-events:none;
}

#ctrls{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.cb{background:transparent;border:1px solid #191919;color:#333;padding:5px 12px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.15em;cursor:pointer;border-radius:3px;transition:all 0.15s;text-transform:uppercase;}
.cb:hover{border-color:#333;color:#555;}
.cb.on{border-color:#0ff;color:#0ff;box-shadow:0 0 10px rgba(0,255,255,0.1);text-shadow:0 0 6px #0ff;}
.cb.hot.on{border-color:#f0f;color:#f0f;box-shadow:0 0 10px rgba(255,0,255,0.1);text-shadow:0 0 6px #f0f;}

#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:20px;}
#ltitle{font-size:12px;letter-spacing:0.5em;color:#1a1a1a;}
#lbw{width:220px;height:1px;background:#0d0d0d;}
#lb{height:1px;background:#0ff;width:0%;transition:width 0.3s;box-shadow:0 0 10px #0ff;}
#lm{font-size:9px;letter-spacing:0.18em;color:#222;}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="loading">
  <div id="ltitle">⚡ AR NEURAL MESH — MAX MODE</div>
  <div id="lbw"><div id="lb"></div></div>
  <div id="lm">initializing...</div>
</div>

<div id="main">
  <div id="ttl">AR NEURAL MESH — MAXIMUM CREATIVE MODE ⚡</div>
  <div id="wrap">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" width="720" height="540"></canvas>

    <div id="mode-badge">⚡ MAX MODE</div>

    <div class="hud" id="htl">
      <div id="h-fps">FPS: --</div>
      <div id="h-hands">HANDS: 0</div>
      <div id="h-face">FACE: --</div>
    </div>
    <div class="hud" id="htr">
      <div id="h-nodes">NODES: 0</div>
      <div id="h-links">LINKS: 0</div>
      <div id="h-dist">DIST: --</div>
    </div>
    <div class="hud" id="hbl">
      <div id="h-bolts">⚡ BOLTS: 0</div>
      <div id="h-snow">❄ FLAKES: 0</div>
    </div>

    <div id="finger-count">
      <div class="fh">
        <div class="fl">HAND 1</div>
        <div class="fn" id="fn0" style="color:#0ff">0</div>
        <div class="fd" id="fd0"></div>
      </div>
      <div class="fsep"></div>
      <div class="fh">
        <div class="fl">HAND 2</div>
        <div class="fn" id="fn1" style="color:#f80">0</div>
        <div class="fd" id="fd1"></div>
      </div>
      <div class="fsep"></div>
      <div class="ftlbl">TOTAL</div>
      <div class="ftotal" id="ftotal">0</div>
    </div>

    <div id="sbar">
      <div class="sdot"></div>
      <span id="smsg">starting...</span>
      <span style="margin-left:auto;color:#161616">MEDIAPIPE // MAX MODE</span>
    </div>
  </div>

  <div id="ctrls">
    <button class="cb on" id="b-sk">SKELETON</button>
    <button class="cb on" id="b-web">INTER WEB</button>
    <button class="cb on" id="b-bolt">⚡ LIGHTNING</button>
    <button class="cb on" id="b-snow">❄ SNOW</button>
    <button class="cb on" id="b-fm">FACE MESH</button>
    <button class="cb on" id="b-fl">FACE LINKS</button>
    <button class="cb on" id="b-rip">RIPPLES</button>
    <button class="cb on" id="b-hm">HEAT DOTS</button>
    <button class="cb" id="b-xr">TRAIL</button>
    <button class="cb hot" id="b-gl">GLITCH</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script>
const W=720,H=540;
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const bgC=document.getElementById('bg');
const bgX=bgC.getContext('2d');

let handR=null,faceR=null;
let t0=performance.now(),frc=0,fps=0;
let nodeCount=0,linkCount=0;
let boltCount=0,snowCount=0;

const FL={sk:true,web:true,bolt:true,snow:true,fm:true,fl:true,rip:true,hm:true,xr:false,gl:false};
function tog(id,k){const b=document.getElementById(id);b.addEventListener('click',()=>{FL[k]=!FL[k];b.classList.toggle('on',FL[k]);});}
['sk','web','bolt','snow','fm','fl','rip','hm','xr','gl'].forEach(k=>tog('b-'+k,k));

// Animated BG — slow aurora drift
bgC.width=window.innerWidth;bgC.height=window.innerHeight;
let bgT=0;
function drawBg(){
  bgT+=0.003;
  bgX.clearRect(0,0,bgC.width,bgC.height);
  // grid
  bgX.strokeStyle='rgba(0,255,255,0.06)';bgX.lineWidth=0.3;
  for(let x=0;x<bgC.width;x+=50){bgX.beginPath();bgX.moveTo(x,0);bgX.lineTo(x,bgC.height);bgX.stroke();}
  for(let y=0;y<bgC.height;y+=50){bgX.beginPath();bgX.moveTo(0,y);bgX.lineTo(bgC.width,y);bgX.stroke();}
  // subtle aurora
  for(let i=0;i<3;i++){
    const g=bgX.createRadialGradient(
      bgC.width*(0.2+i*0.3+Math.sin(bgT+i)*0.15),
      bgC.height*(0.3+Math.cos(bgT*0.7+i)*0.2),
      0,
      bgC.width*(0.2+i*0.3+Math.sin(bgT+i)*0.15),
      bgC.height*(0.3+Math.cos(bgT*0.7+i)*0.2),
      bgC.width*0.35
    );
    const cols=[['rgba(0,255,255,0.04)','transparent'],['rgba(255,0,255,0.03)','transparent'],['rgba(0,255,136,0.03)','transparent']];
    g.addColorStop(0,cols[i][0]);g.addColorStop(1,cols[i][1]);
    bgX.fillStyle=g;bgX.fillRect(0,0,bgC.width,bgC.height);
  }
  requestAnimationFrame(drawBg);
}
drawBg();

// ========== SNOW / STAR PARTICLES ==========
const SNOW=[];
class Snowflake{
  constructor(x,y,col){
    this.x=x;this.y=y;
    const angle=Math.random()*Math.PI*2;
    const spd=1+Math.random()*3;
    this.vx=Math.cos(angle)*spd;
    this.vy=Math.sin(angle)*spd-1.5;
    this.life=1;
    this.decay=0.012+Math.random()*0.025;
    this.r=1.5+Math.random()*3;
    this.col=col;
    this.type=Math.random()<0.4?'star':'flake'; // star or flake shape
    this.rot=Math.random()*Math.PI;
    this.rotV=(Math.random()-.5)*0.2;
    this.gravity=0.04;
  }
  tick(){
    this.x+=this.vx;this.y+=this.vy;
    this.vy+=this.gravity;
    this.vx*=0.98;
    this.rot+=this.rotV;
    this.life-=this.decay;
  }
  draw(c){
    if(this.life<=0)return;
    c.save();c.globalAlpha=this.life*0.95;
    c.translate(this.x,this.y);c.rotate(this.rot);
    c.strokeStyle=this.col;c.fillStyle=this.col;
    c.shadowColor=this.col;c.shadowBlur=8;
    c.lineWidth=0.8;
    if(this.type==='star'){
      // 6-pointed snowflake
      for(let i=0;i<6;i++){
        c.save();c.rotate(i*Math.PI/3);
        c.beginPath();c.moveTo(0,0);c.lineTo(0,this.r*2.5);
        c.stroke();
        // branches
        c.beginPath();c.moveTo(0,this.r);c.lineTo(this.r*0.6,this.r*0.4);c.stroke();
        c.beginPath();c.moveTo(0,this.r);c.lineTo(-this.r*0.6,this.r*0.4);c.stroke();
        c.restore();
      }
      c.beginPath();c.arc(0,0,1.5,0,Math.PI*2);c.fill();
    } else {
      // glowing diamond dot
      c.beginPath();
      c.moveTo(0,-this.r);c.lineTo(this.r*0.5,0);c.lineTo(0,this.r);c.lineTo(-this.r*0.5,0);
      c.closePath();c.fill();
    }
    c.restore();
  }
}

// ========== LIGHTNING BOLT ==========
const BOLTS=[];
class LightningBolt{
  constructor(ax,ay,bx,by,col1,col2){
    this.col1=col1;this.col2=col2;
    this.life=1;this.decay=0.06+Math.random()*0.08;
    this.segments=this._gen(ax,ay,bx,by,5);
    this.width=1.5+Math.random()*2;
  }
  _gen(ax,ay,bx,by,depth){
    if(depth===0)return[[ax,ay,bx,by]];
    const mx=(ax+bx)/2+(Math.random()-.5)*(Math.hypot(bx-ax,by-ay)*0.45);
    const my=(ay+by)/2+(Math.random()-.5)*(Math.hypot(bx-ax,by-ay)*0.45);
    return[...this._gen(ax,ay,mx,my,depth-1),...this._gen(mx,my,bx,by,depth-1)];
  }
  tick(){this.life-=this.decay;}
  draw(c){
    if(this.life<=0)return;
    const prog=this.segments.length;
    this.segments.forEach(([ax,ay,bx,by],i)=>{
      const t=i/prog;
      c.save();
      c.globalAlpha=this.life*(0.7+Math.random()*0.3);
      // interpolate color
      c.strokeStyle=this.col1;
      c.lineWidth=this.width*this.life;
      c.shadowColor=this.col1;c.shadowBlur=18;
      c.lineCap='round';
      c.beginPath();c.moveTo(ax,ay);c.lineTo(bx,by);c.stroke();
      // inner bright core
      c.strokeStyle='#ffffff';c.lineWidth=this.width*this.life*0.3;c.shadowBlur=6;
      c.beginPath();c.moveTo(ax,ay);c.lineTo(bx,by);c.stroke();
      c.restore();
    });
  }
}

// ========== RIPPLES ==========
const RIPPLES=[];
class Ripple{
  constructor(x,y,col){this.x=x;this.y=y;this.col=col;this.r=5;this.maxR=60+Math.random()*40;this.life=1;this.decay=0.022;}
  tick(){this.r+=2.8;this.life-=this.decay;}
  draw(c){
    c.save();c.globalAlpha=this.life*0.5;
    c.strokeStyle=this.col;c.lineWidth=1;c.shadowColor=this.col;c.shadowBlur=10;
    c.beginPath();c.arc(this.x,this.y,this.r,0,Math.PI*2);c.stroke();
    c.restore();
  }
}

// ========== HELPERS ==========
function lm(l){return{x:l.x*W,y:l.y*H};}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function line(c,a,b,col,w,bl,al=1){
  c.save();c.globalAlpha=al;c.strokeStyle=col;c.lineWidth=w;
  c.shadowColor=col;c.shadowBlur=bl;c.lineCap='round';
  c.beginPath();c.moveTo(a.x,a.y);c.lineTo(b.x,b.y);c.stroke();c.restore();
}
function gline(c,a,b,ca,cb,w,al=1,bl=16){
  const g=c.createLinearGradient(a.x,a.y,b.x,b.y);
  g.addColorStop(0,ca);g.addColorStop(1,cb);
  c.save();c.globalAlpha=al;c.strokeStyle=g;c.lineWidth=w;
  c.shadowColor=ca;c.shadowBlur=bl;c.lineCap='round';
  c.beginPath();c.moveTo(a.x,a.y);c.lineTo(b.x,b.y);c.stroke();c.restore();
}
function dot(c,x,y,col,r,bl,al=1){
  c.save();c.globalAlpha=al;c.fillStyle=col;c.shadowColor=col;c.shadowBlur=bl;
  c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();c.restore();
}
function contour(c,pts,col,w){
  if(!pts||pts.length<2)return;
  c.save();c.strokeStyle=col;c.lineWidth=w;c.shadowColor=col;c.shadowBlur=16;
  c.lineCap='round';c.lineJoin='round';
  c.beginPath();c.moveTo(pts[0].x,pts[0].y);
  pts.forEach(p=>c.lineTo(p.x,p.y));c.stroke();c.restore();
}

const TIPCOLORS=['#ff2060','#ff8800','#ffee00','#00ff88','#00ccff'];
const HCON=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17],[5,17]];
const TIPS=[4,8,12,16,20];
const KN=[5,9,13,17];

const F_OV=[10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109,10];
const F_LE=[33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246,33];
const F_RE=[362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398,362];
const F_LO=[61,146,91,181,84,17,314,405,321,375,291,409,270,269,267,0,37,39,40,185,61];
const F_LI=[78,95,88,178,87,14,317,402,318,324,308,415,310,311,312,13,82,81,80,191,78];
const F_LB=[55,65,52,53,46,70,63,105,66,107,55];
const F_RB=[285,295,282,283,276,300,293,334,296,336,285];
const F_NS=[168,6,197,195,5,4,1,19,94,2];
function fp(lms,idx){return idx.map(i=>lm(lms[i]));}

// ========== FINGER COUNT ==========
function countFingers(lms){
  return[
    lms[4].x<lms[3].x,
    lms[8].y<lms[6].y,
    lms[12].y<lms[10].y,
    lms[16].y<lms[14].y,
    lms[20].y<lms[18].y,
  ];
}
const handColors=['#0ff','#f80'];
function updateFingerUI(f0,f1){
  [f0,f1].forEach((f,hi)=>{
    const n=f.filter(Boolean).length;
    document.getElementById(`fn${hi}`).textContent=n;
    let el=document.getElementById(`fd${hi}`);
    if(!el.children.length){for(let i=0;i<5;i++){const d=document.createElement('div');d.className='fdot';el.appendChild(d);}}
    [...el.children].forEach((d,i)=>{
      d.style.background=f[i]?handColors[hi]:'transparent';
      d.style.borderColor=f[i]?handColors[hi]:'#1e1e1e';
      d.style.boxShadow=f[i]?`0 0 7px ${handColors[hi]}`:'none';
    });
  });
  const total=f0.filter(Boolean).length+f1.filter(Boolean).length;
  const el=document.getElementById('ftotal');
  el.textContent=total;
  el.style.textShadow=total>0?`0 0 25px #fff, 0 0 50px rgba(255,255,255,0.3)`:'none';
}

// ========== DRAW HAND ==========
let prevTipPos=[[],[]]; // for velocity-based effects
function drawHand(c,lms,hIdx){
  const pts=lms.map(l=>lm(l));
  nodeCount+=pts.length;

  // skeleton
  if(FL.sk){
    HCON.forEach(([a,b])=>{
      const ca=TIPCOLORS[Math.floor(a/5)%5];
      const cb=TIPCOLORS[Math.floor(b/5)%5];
      gline(c,pts[a],pts[b],ca,cb,2.2,0.95,18);
      linkCount++;
    });
  }

  // heat dots
  if(FL.hm){
    pts.forEach((p,i)=>{
      if(TIPS.includes(i)){
        dot(c,p.x,p.y,'#fff',5.5,28);
        dot(c,p.x,p.y,TIPCOLORS[TIPS.indexOf(i)],3.5,14);
      } else if(KN.includes(i)){
        dot(c,p.x,p.y,'#00ffee',3,12);
      } else if(i===0){
        dot(c,p.x,p.y,'#ff9900',4,16);
      } else {
        dot(c,p.x,p.y,'#00ff88',2,6);
      }
    });
  }

  // intra-hand tip web
  if(FL.web){
    for(let i=0;i<TIPS.length;i++){
      for(let j=i+1;j<TIPS.length;j++){
        const a=pts[TIPS[i]],b=pts[TIPS[j]];
        const d=dst(a,b);
        const al=Math.max(0,1-d/260)*0.6;
        if(al>0.05){gline(c,a,b,TIPCOLORS[i],TIPCOLORS[j],1.2,al,12);}
      }
    }
  }

  // SNOW from all dots
  if(FL.snow){
    pts.forEach((p,i)=>{
      const isTip=TIPS.includes(i);
      const rate=isTip?0.35:0.08;
      if(Math.random()<rate){
        SNOW.push(new Snowflake(p.x,p.y,isTip?TIPCOLORS[TIPS.indexOf(i)||0]:'#ffffff'));
      }
    });
  }

  // RIPPLES from tips occasionally
  if(FL.rip&&Math.random()<0.08){
    const ti=TIPS[Math.floor(Math.random()*TIPS.length)];
    RIPPLES.push(new Ripple(pts[ti].x,pts[ti].y,TIPCOLORS[TIPS.indexOf(ti)]));
  }

  // LIGHTNING between fingertips of same hand
  if(FL.bolt&&Math.random()<0.15){
    const i=Math.floor(Math.random()*TIPS.length);
    const j=(i+1+Math.floor(Math.random()*(TIPS.length-1)))%TIPS.length;
    const a=pts[TIPS[i]],b=pts[TIPS[j]];
    BOLTS.push(new LightningBolt(a.x,a.y,b.x,b.y,TIPCOLORS[i],TIPCOLORS[j]));
  }

  return pts;
}

// ========== INTER-HAND WEB — BOLD ==========
function drawInterWeb(c,all){
  if(!FL.web||all.length<2)return;
  const h0=all[0],h1=all[1];

  // === BOLD tip-to-tip lines ===
  for(let i=0;i<TIPS.length;i++){
    for(let j=0;j<TIPS.length;j++){
      const a=h0[TIPS[i]],b=h1[TIPS[j]];
      const d=dst(a,b);
      const al=Math.max(0,1-d/560);
      if(al>0.03){
        // Pass 1: outer glow thick
        gline(c,a,b,TIPCOLORS[i],TIPCOLORS[j],4,al*0.5,40);
        // Pass 2: mid line
        gline(c,a,b,TIPCOLORS[i],TIPCOLORS[j],2.5,al*0.85,20);
        // Pass 3: bright white core
        gline(c,a,b,'#ffffff','#ffffff',0.8,al*0.6,6);
        linkCount++;
      }
    }
  }

  // knuckle bridge
  KN.forEach((k,i)=>{
    const a=h0[k],b=h1[k];
    const d=dst(a,b);
    const al=Math.max(0,1-d/560)*0.65;
    if(al>0.04){
      gline(c,a,b,'#ff00ff','#00ffff',2,al,18);
      gline(c,a,b,'#ffffff','#ffffff',0.6,al*0.4,6);
    }
  });

  // wrist link
  const wd=dst(h0[0],h1[0]);
  const wal=Math.max(0,1-wd/600)*0.5;
  if(wal>0.03){
    line(c,h0[0],h1[0],'#ffffff',1.5,12,wal);
  }

  // LIGHTNING between hands ⚡
  if(FL.bolt&&Math.random()<0.22){
    const i=Math.floor(Math.random()*TIPS.length);
    const j=Math.floor(Math.random()*TIPS.length);
    const a=h0[TIPS[i]],b=h1[TIPS[j]];
    const d=dst(a,b);
    // only bolt if hands are somewhat close
    if(d<420){
      BOLTS.push(new LightningBolt(a.x,a.y,b.x,b.y,TIPCOLORS[i],TIPCOLORS[j]));
    }
  }
}

// ========== FACE MESH ==========
function drawFaceMesh(c,lms){
  if(!FL.fm||!lms)return;
  nodeCount+=lms.length;
  contour(c,fp(lms,F_OV),'#ff00ff',1.5);
  contour(c,fp(lms,F_LE),'#00ffff',1.1);
  contour(c,fp(lms,F_RE),'#00ffff',1.1);
  contour(c,fp(lms,F_LO),'#ff6600',1.1);
  contour(c,fp(lms,F_LI),'#ff2200',0.8);
  contour(c,fp(lms,F_LB),'#ffee00',1.0);
  contour(c,fp(lms,F_RB),'#ffee00',1.0);
  contour(c,fp(lms,F_NS),'#88ffee',0.9);
  for(let i=0;i<lms.length;i+=14){const p=lm(lms[i]);dot(c,p.x,p.y,'#ff00cc',1.1,7);}
  [1,33,263,61,291,152,10,199].forEach(i=>{const p=lm(lms[i]);dot(c,p.x,p.y,'#ffffff',2.8,14);});
  // snow from face landmarks occasionally
  if(FL.snow&&Math.random()<0.12){
    const faceSnowPts=[1,33,263,61,291,152];
    const fp2=faceSnowPts[Math.floor(Math.random()*faceSnowPts.length)];
    const p=lm(lms[fp2]);
    SNOW.push(new Snowflake(p.x,p.y,'#ff00ff'));
  }
}

// ========== FACE → HAND LINKS ==========
function drawFaceLinks(c,flms,all){
  if(!FL.fl||!flms||all.length===0)return;
  const anchors=[lm(flms[1]),lm(flms[152]),lm(flms[33]),lm(flms[263]),lm(flms[13])];
  const acols=['#ff00aa','#00ffff','#ffff00','#ff8800','#ff00cc'];
  all.forEach(pts=>{
    TIPS.forEach((ti,fi)=>{
      anchors.forEach((anch,ai)=>{
        const d=dst(pts[ti],anch);
        const al=Math.max(0,1-d/360)*0.5;
        if(al>0.06){
          line(c,pts[ti],anch,acols[ai],1.5,12,al);
          line(c,pts[ti],anch,'#fff',0.4,4,al*0.4);
          linkCount++;
        }
      });
    });
  });
}

// ========== SCANLINES ==========
function drawScanlines(c){
  c.save();c.globalAlpha=0.025;c.fillStyle='#000';
  for(let y=0;y<H;y+=3){c.fillRect(0,y,W,1);}
  c.restore();
}

// ========== GLITCH ==========
function doGlitch(c){
  if(!FL.gl)return;
  if(Math.random()<0.1){
    const y=Math.random()*H,h=2+Math.random()*18,sh=(Math.random()-.5)*60;
    try{c.drawImage(canvas,0,y,W,h,sh,y,W,h);}catch(e){}
  }
  if(Math.random()<0.04){c.save();c.fillStyle=`rgba(${Math.random()<0.5?'255,0,136':'0,255,255'},0.05)`;c.fillRect(0,0,W,H);c.restore();}
}

// ========== MAIN RENDER ==========
function render(){
  requestAnimationFrame(render);
  nodeCount=0;linkCount=0;

  if(FL.xr){ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fillRect(0,0,W,H);}
  else{ctx.clearRect(0,0,W,H);}

  const all=[];
  let f0=[false,false,false,false,false];
  let f1=[false,false,false,false,false];

  if(handR?.multiHandLandmarks){
    handR.multiHandLandmarks.forEach((lms,i)=>{
      all.push(drawHand(ctx,lms,i));
      if(i===0)f0=countFingers(lms);
      if(i===1)f1=countFingers(lms);
    });
  }

  updateFingerUI(f0,f1);
  drawInterWeb(ctx,all);

  const flms=faceR?.multiFaceLandmarks?.[0];
  if(flms){
    drawFaceMesh(ctx,flms);
    drawFaceLinks(ctx,flms,all);
  }

  // draw snow
  for(let i=SNOW.length-1;i>=0;i--){
    SNOW[i].tick();SNOW[i].draw(ctx);
    if(SNOW[i].life<=0)SNOW.splice(i,1);
  }

  // draw ripples
  for(let i=RIPPLES.length-1;i>=0;i--){
    RIPPLES[i].tick();RIPPLES[i].draw(ctx);
    if(RIPPLES[i].life<=0)RIPPLES.splice(i,1);
  }

  // draw lightning
  boltCount=0;
  for(let i=BOLTS.length-1;i>=0;i--){
    BOLTS[i].tick();BOLTS[i].draw(ctx);
    if(BOLTS[i].life<=0)BOLTS.splice(i,1);
    else boltCount++;
  }

  // xray vignette
  if(FL.xr){
    const g=ctx.createRadialGradient(W/2,H/2,60,W/2,H/2,Math.max(W,H)/1.4);
    g.addColorStop(0,'rgba(0,255,255,0)');g.addColorStop(1,'rgba(0,0,0,0.65)');
    ctx.save();ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.restore();
  }

  doGlitch(ctx);
  drawScanlines(ctx);

  // limit particle count for perf
  if(SNOW.length>400){SNOW.splice(0,SNOW.length-400);}
  if(BOLTS.length>30){BOLTS.splice(0,BOLTS.length-30);}

  // FPS
  frc++;const now=performance.now();
  if(now-t0>=1000){fps=Math.round(frc*1000/(now-t0));frc=0;t0=now;}

  // HUD
  document.getElementById('h-fps').textContent='FPS: '+fps;
  document.getElementById('h-hands').textContent='HANDS: '+(handR?.multiHandLandmarks?.length||0);
  document.getElementById('h-face').textContent='FACE: '+(faceR?.multiFaceLandmarks?.length>0?'ON':'--');
  document.getElementById('h-nodes').textContent='NODES: '+nodeCount;
  document.getElementById('h-links').textContent='LINKS: '+linkCount;
  document.getElementById('h-bolts').textContent='⚡ BOLTS: '+boltCount;
  document.getElementById('h-snow').textContent='❄ FLAKES: '+SNOW.length;

  const hls=handR?.multiHandLandmarks||[];
  if(hls.length>=2){
    const d=dst(lm(hls[0][0]),lm(hls[1][0]));
    document.getElementById('h-dist').textContent='DIST: '+Math.round(d)+'px';
  } else {
    document.getElementById('h-dist').textContent='DIST: --';
  }
}

// ========== LOAD ==========
function setLoad(p,m){document.getElementById('lb').style.width=p+'%';document.getElementById('lm').textContent=m;}
async function init(){
  setLoad(8,'requesting camera...');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:720,height:540,facingMode:'user'}});
    video.srcObject=stream;
    await new Promise(r=>video.onloadedmetadata=r);
    setLoad(28,'loading hand model...');

    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.65,minTrackingConfidence:0.55});
    hands.onResults(r=>handR=r);

    setLoad(58,'loading face model...');
    const face=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    face.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
    face.onResults(r=>faceR=r);

    setLoad(82,'starting pipeline...');
    const cam=new Camera(video,{
      onFrame:async()=>{await hands.send({image:video});await face.send({image:video});},
      width:720,height:540
    });
    await cam.start();
    setLoad(100,'⚡ ready');
    setTimeout(()=>{
      document.getElementById('loading').style.display='none';
      document.getElementById('smsg').textContent='⚡ max mode active — show your hands';
    },350);
    render();
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('smsg').textContent='error: '+e.message;
    console.error(e);
  }
}
init();
</script>
