<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Air Write</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace}

#board{position:absolute;inset:0;width:100%;height:100%}

#video{
  position:absolute;bottom:16px;right:16px;
  width:220px;height:165px;
  border-radius:14px;border:1.5px solid rgba(255,255,255,0.12);
  object-fit:cover;transform:scaleX(-1);
  z-index:10;opacity:0.9;
}
#hand-canvas{
  position:absolute;bottom:16px;right:16px;
  width:220px;height:165px;border-radius:14px;
  transform:scaleX(-1);z-index:11;pointer-events:none;
}

#toolbar{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;
  background:rgba(20,20,20,0.85);backdrop-filter:blur(12px);
  border:0.5px solid rgba(255,255,255,0.1);border-radius:100px;
  padding:8px 16px;z-index:30;
}
.cbtn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:.15s}
.cbtn.on{border-color:white;transform:scale(1.2)}
.cbtn:hover{transform:scale(1.15)}
.sep{width:0.5px;height:18px;background:rgba(255,255,255,0.15)}
.tbtn{
  background:transparent;border:0.5px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.6);font-family:'Courier New',monospace;
  font-size:10px;letter-spacing:.06em;padding:4px 11px;
  border-radius:100px;cursor:pointer;transition:.15s;
}
.tbtn:hover,.tbtn.on{background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.35)}
#sz{
  -webkit-appearance:none;width:70px;height:3px;
  background:rgba(255,255,255,0.2);border-radius:2px;outline:none;
}
#sz::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#fff;cursor:pointer}

#status{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:.12em;color:rgba(255,255,255,0.3);
  text-transform:uppercase;z-index:20;pointer-events:none;
  transition:opacity .4s;white-space:nowrap;
}

#cursor{
  position:absolute;pointer-events:none;z-index:50;
  width:18px;height:18px;border-radius:50%;
  transform:translate(-50%,-50%);
  transition:background .15s;
}

#load{
  position:absolute;inset:0;background:#0d0d0d;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:200;gap:20px;
}
#load h1{color:rgba(255,255,255,.8);font-size:26px;letter-spacing:.25em;font-weight:normal}
#load p{color:rgba(255,255,255,.3);font-size:11px;letter-spacing:.15em;text-transform:uppercase}
.spin{width:36px;height:36px;border:1.5px solid rgba(255,255,255,.1);border-top-color:rgba(255,255,255,.6);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

#mode-badge{
  position:absolute;top:72px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.25);z-index:20;pointer-events:none;
  transition:color .3s;
}
</style>
</head>
<body>
<canvas id="board"></canvas>

<div id="load">
  <h1>AIR WRITE</h1>
  <div class="spin"></div>
  <p id="lmsg">Loading…</p>
</div>

<div id="toolbar">
  <div class="cbtn on" style="background:#fff" data-c="#ffffff"></div>
  <div class="cbtn" style="background:#f5c518" data-c="#f5c518"></div>
  <div class="cbtn" style="background:#4fc3f7" data-c="#4fc3f7"></div>
  <div class="cbtn" style="background:#66bb6a" data-c="#66bb6a"></div>
  <div class="cbtn" style="background:#ef5350" data-c="#ef5350"></div>
  <div class="cbtn" style="background:#ce93d8" data-c="#ce93d8"></div>
  <div class="sep"></div>
  <input type="range" id="sz" min="3" max="28" value="7">
  <div class="sep"></div>
  <button class="tbtn" id="undoBtn">Undo</button>
  <button class="tbtn" id="clearBtn">Clear</button>
</div>

<video id="video" autoplay muted playsinline></video>
<canvas id="hand-canvas"></canvas>

<div id="cursor"></div>
<div id="status">☝️ Yozing · 🤏 Pinch = to'xtat · ✌️ = tanla/siljit/kattalashtir</div>
<div id="mode-badge">WRITE MODE</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ─── Canvas setup ───────────────────────────────────────────────
const board = document.getElementById('board');
const ctx   = board.getContext('2d');

function resize(){
  board.width  = window.innerWidth;
  board.height = window.innerHeight;
  redraw();
}
window.addEventListener('resize', resize);
board.width  = window.innerWidth;
board.height = window.innerHeight;

// ─── State ──────────────────────────────────────────────────────
let color    = '#ffffff';
let brushSz  = 7;
let mode     = 'write'; // 'write' | 'select'

// A stroke = { points:[], color, size, selected:false }
// A group (frozen) = { strokes:[], x, y, w, h, scale, rotation:0, selected:false, offscreen:canvas }
const strokes = [];   // completed groups on board
let liveStroke = null; // currently drawing

let selGroup  = null; // selected group
let dragStart = null; // {gx,gy,px,py}
let scaleStart= null; // {dist, scale0, cx, cy}

const modeBadge = document.getElementById('mode-badge');
const cursor    = document.getElementById('cursor');
const lmsg      = document.getElementById('lmsg');
const loadEl    = document.getElementById('load');

function setMode(m){
  mode = m;
  modeBadge.textContent = m === 'write' ? 'WRITE MODE' : 'SELECT MODE';
  modeBadge.style.color = m === 'write' ? 'rgba(255,255,255,.25)' : 'rgba(100,200,255,.6)';
}

// ─── Rendering ──────────────────────────────────────────────────
function redraw(){
  ctx.clearRect(0,0,board.width,board.height);
  // faint grid
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.025)';
  ctx.lineWidth=0.5;
  for(let y=40;y<board.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(board.width,y);ctx.stroke()}
  ctx.restore();

  for(const g of strokes) drawGroup(g);

  // live stroke
  if(liveStroke && liveStroke.points.length>1){
    drawChalkPath(ctx, liveStroke.points, liveStroke.color, liveStroke.size);
  }
}

function drawGroup(g){
  ctx.save();
  const cx = g.x + g.w*g.scale/2;
  const cy = g.y + g.h*g.scale/2;
  ctx.translate(cx, cy);
  ctx.scale(g.scale, g.scale);
  ctx.translate(-g.w/2, -g.h/2);
  ctx.drawImage(g.offscreen, 0, 0);
  ctx.restore();

  if(g.selected){
    ctx.save();
    ctx.strokeStyle='rgba(100,200,255,0.7)';
    ctx.lineWidth=1.5;
    ctx.setLineDash([5,4]);
    const pad=10;
    const sw=g.w*g.scale, sh=g.h*g.scale;
    ctx.strokeRect(g.x-pad, g.y-pad, sw+pad*2, sh+pad*2);
    // corner handles
    ctx.fillStyle='rgba(100,200,255,0.9)';
    ctx.setLineDash([]);
    for(const [hx,hy] of [
      [g.x-pad,g.y-pad],[g.x+sw+pad,g.y-pad],
      [g.x-pad,g.y+sh+pad],[g.x+sw+pad,g.y+sh+pad]
    ]){
      ctx.beginPath();ctx.arc(hx,hy,6,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
}

function drawChalkPath(targetCtx, points, col, sz){
  const r=parseInt(col.slice(1,3),16);
  const g=parseInt(col.slice(3,5),16);
  const b=parseInt(col.slice(5,7),16);
  for(let i=1;i<points.length;i++){
    const px=points[i-1], p=points[i];
    for(let j=0;j<3;j++){
      targetCtx.strokeStyle=`rgba(${r},${g},${b},${0.5+Math.random()*0.4})`;
      targetCtx.lineWidth=sz*(0.5+Math.random()*0.6);
      targetCtx.lineCap='round';targetCtx.lineJoin='round';
      targetCtx.beginPath();
      targetCtx.moveTo(px.x+(Math.random()-.5)*sz*.3, px.y+(Math.random()-.5)*sz*.3);
      targetCtx.lineTo(p.x+(Math.random()-.5)*sz*.3,   p.y+(Math.random()-.5)*sz*.3);
      targetCtx.stroke();
    }
  }
}

function freezeStroke(stroke){
  if(!stroke || stroke.points.length < 2) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const p of stroke.points){
    minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);
    maxX=Math.max(maxX,p.x);maxY=Math.max(maxY,p.y);
  }
  const pad=stroke.size*2+10;
  minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  const w=maxX-minX, h=maxY-minY;
  const off=document.createElement('canvas');
  off.width=w; off.height=h;
  const octx=off.getContext('2d');
  // shift points
  const pts=stroke.points.map(p=>({x:p.x-minX,y:p.y-minY}));
  drawChalkPath(octx,pts,stroke.color,stroke.size);
  strokes.push({offscreen:off,x:minX,y:minY,w,h,scale:1,selected:false});
}

function undo(){
  if(strokes.length){strokes.pop();redraw();}
}

// ─── Hit test & interaction ──────────────────────────────────────
function hitTest(px,py){
  for(let i=strokes.length-1;i>=0;i--){
    const g=strokes[i];
    const sw=g.w*g.scale, sh=g.h*g.scale;
    const pad=12;
    if(px>=g.x-pad && px<=g.x+sw+pad && py>=g.y-pad && py<=g.y+sh+pad) return g;
  }
  return null;
}

// ─── Smooth cursor ───────────────────────────────────────────────
let sx=null,sy=null;
function lerp(a,b,t){return a+(b-a)*t}
function smooth(x,y){
  if(sx===null){sx=x;sy=y;}
  sx=lerp(sx,x,0.35); sy=lerp(sy,y,0.35);
  return {x:sx,y:sy};
}

function dist2d(ax,ay,bx,by){return Math.sqrt((bx-ax)**2+(by-ay)**2)}

// ─── Hand logic ─────────────────────────────────────────────────
let lastDraw={x:null,y:null};
let pinchCooldown=0;

function onHands(res){
  const hc=document.getElementById('hand-canvas');
  const hctx=hc.getContext('2d');
  hctx.clearRect(0,0,hc.width,hc.height);

  const W=board.width, H=board.height;

  if(!res.multiHandLandmarks||!res.multiHandLandmarks.length){
    if(liveStroke&&liveStroke.points.length>2){freezeStroke(liveStroke);}
    liveStroke=null;
    lastDraw={x:null,y:null};
    cursor.style.opacity='0';
    redraw(); return;
  }

  const lm=res.multiHandLandmarks[0];
  function lp(i){return{x:(1-lm[i].x)*W, y:lm[i].y*H}}

  const tip  =lp(8);  // index tip
  const imid =lp(6);
  const thumb=lp(4);
  const mid  =lp(12);
  const ring =lp(16);
  const wrist=lp(0);

  const {x:fx,y:fy}=smooth(tip.x,tip.y);

  const handSpan=dist2d(wrist.x,wrist.y,mid.x,mid.y);
  const pinch=dist2d(thumb.x,thumb.y,tip.x,tip.y)/Math.max(handSpan,1);

  const indexUp = tip.y < imid.y - handSpan*0.04;
  const midUp   = mid.y < lp(10).y - handSpan*0.04;
  const ringUp  = ring.y < lp(14).y - handSpan*0.04;

  // Gesture: two fingers up (peace) = SELECT mode
  const twoFingers = indexUp && midUp && !ringUp;
  // Gesture: only index up = WRITE
  const oneFingerUp = indexUp && !midUp;
  // Pinch = pause/confirm
  const isPinch = pinch < 0.22;

  if(twoFingers && !isPinch){ setMode('select'); }
  else if(oneFingerUp){ setMode('write'); }

  // Cursor
  cursor.style.left=fx+'px'; cursor.style.top=fy+'px';
  cursor.style.opacity='1';

  // Draw hand skeleton on overlay
  hctx.save();
  hctx.strokeStyle='rgba(255,255,255,0.4)';
  hctx.lineWidth=1;
  for(const c of Hands.HAND_CONNECTIONS){
    const a=lm[c[0]],b=lm[c[1]];
    hctx.beginPath();
    hctx.moveTo((1-a.x)*hc.width, a.y*hc.height);
    hctx.lineTo((1-b.x)*hc.width, b.y*hc.height);
    hctx.stroke();
  }
  for(let i=0;i<lm.length;i++){
    const p=lm[i];
    hctx.beginPath();
    hctx.arc((1-p.x)*hc.width,p.y*hc.height, i===8?4:2.5, 0,Math.PI*2);
    hctx.fillStyle=i===8?color:'rgba(255,255,255,0.7)';
    hctx.fill();
  }
  hctx.restore();

  // ── WRITE MODE ──
  if(mode==='write'){
    cursor.style.background=isPinch?'rgba(255,255,255,0.3)':color;
    cursor.style.border=isPinch?'2px solid white':'none';

    if(!isPinch && oneFingerUp){
      if(!liveStroke) liveStroke={points:[],color,size:brushSz};
      if(lastDraw.x!==null){
        liveStroke.points.push({x:fx,y:fy});
      } else {
        liveStroke.points.push({x:fx,y:fy});
      }
      lastDraw={x:fx,y:fy};
    } else if(isPinch){
      // pinch = finish stroke
      if(liveStroke&&liveStroke.points.length>2){
        freezeStroke(liveStroke);
        liveStroke=null;
      }
      lastDraw={x:null,y:null};
    } else {
      lastDraw={x:null,y:null};
      if(liveStroke&&liveStroke.points.length>2){freezeStroke(liveStroke);liveStroke=null;}
    }
    redraw();
    return;
  }

  // ── SELECT MODE ──
  cursor.style.background='rgba(100,200,255,0.5)';
  cursor.style.border='1.5px solid rgba(100,200,255,0.9)';

  if(isPinch){
    // Start drag or scale
    if(!dragStart){
      // find hit
      const hit=hitTest(fx,fy);
      if(hit){
        // deselect others
        strokes.forEach(g=>g.selected=false);
        hit.selected=true;
        selGroup=hit;
        dragStart={gx:hit.x, gy:hit.y, px:fx, py:fy};
      } else {
        strokes.forEach(g=>g.selected=false);
        selGroup=null;
      }
    } else if(selGroup){
      // drag
      const dx=fx-dragStart.px, dy=fy-dragStart.py;
      selGroup.x=dragStart.gx+dx;
      selGroup.y=dragStart.gy+dy;
    }
  } else {
    dragStart=null;
  }

  // Scale with two-hand pinch distance (simulate with thumb-middle distance)
  // If only one hand: use pinch distance change for scale
  if(selGroup && isPinch && dragStart){
    // no-op; dragging
  }

  redraw();
}

// Scale via slider for selected group (keyboard shortcut too)
document.addEventListener('wheel', e=>{
  if(selGroup){
    e.preventDefault();
    const delta=e.deltaY>0?0.93:1.07;
    selGroup.scale=Math.max(0.1,Math.min(8,selGroup.scale*delta));
    redraw();
  }
},{passive:false});

// Keyboard shortcuts
document.addEventListener('keydown', e=>{
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){undo();}
  if(e.key==='Escape'){strokes.forEach(g=>g.selected=false);selGroup=null;redraw();}
  if(e.key==='Delete'&&selGroup){
    const i=strokes.indexOf(selGroup);
    if(i>-1){strokes.splice(i,1);selGroup=null;redraw();}
  }
  if(e.key===']'&&selGroup){selGroup.scale=Math.min(8,selGroup.scale*1.1);redraw();}
  if(e.key==='['&&selGroup){selGroup.scale=Math.max(0.1,selGroup.scale*0.9);redraw();}
});

// Mouse fallback
let mouseDown=false;
board.addEventListener('mousedown', e=>{
  if(mode==='write'){
    liveStroke={points:[{x:e.clientX,y:e.clientY}],color,size:brushSz};
    mouseDown=true;
  } else {
    const hit=hitTest(e.clientX,e.clientY);
    strokes.forEach(g=>g.selected=false);
    if(hit){hit.selected=true;selGroup=hit;dragStart={gx:hit.x,gy:hit.y,px:e.clientX,py:e.clientY};}
    else selGroup=null;
    mouseDown=true;
    redraw();
  }
});
board.addEventListener('mousemove',e=>{
  cursor.style.left=e.clientX+'px';cursor.style.top=e.clientY+'px';cursor.style.opacity='1';
  if(!mouseDown)return;
  if(mode==='write'&&liveStroke){
    liveStroke.points.push({x:e.clientX,y:e.clientY});
    redraw();
  } else if(mode==='select'&&selGroup&&dragStart){
    selGroup.x=dragStart.gx+(e.clientX-dragStart.px);
    selGroup.y=dragStart.gy+(e.clientY-dragStart.py);
    redraw();
  }
});
board.addEventListener('mouseup',()=>{
  mouseDown=false;
  if(mode==='write'&&liveStroke&&liveStroke.points.length>2){freezeStroke(liveStroke);liveStroke=null;redraw();}
  dragStart=null;
});
board.addEventListener('mouseleave',()=>{cursor.style.opacity='0';});

// Touch scale (pinch zoom on selected)
let initTouchDist=null, initScale=null;
board.addEventListener('touchstart',e=>{
  if(e.touches.length===2&&selGroup){
    initTouchDist=dist2d(e.touches[0].clientX,e.touches[0].clientY,e.touches[1].clientX,e.touches[1].clientY);
    initScale=selGroup.scale;
  }
});
board.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&selGroup&&initTouchDist){
    e.preventDefault();
    const d=dist2d(e.touches[0].clientX,e.touches[0].clientY,e.touches[1].clientX,e.touches[1].clientY);
    selGroup.scale=Math.max(0.1,Math.min(8,initScale*(d/initTouchDist)));
    redraw();
  }
},{passive:false});

// ─── Toolbar ────────────────────────────────────────────────────
document.querySelectorAll('.cbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    color=b.dataset.c;
    cursor.style.background=color;
  });
});
document.getElementById('sz').addEventListener('input',e=>{brushSz=+e.target.value;});
document.getElementById('undoBtn').addEventListener('click',undo);
document.getElementById('clearBtn').addEventListener('click',()=>{strokes.length=0;liveStroke=null;selGroup=null;redraw();});

// Write/Select mode button (optional)
// Tap board in select mode to deselect
board.addEventListener('click',e=>{
  if(mode==='select'&&!hitTest(e.clientX,e.clientY)){
    strokes.forEach(g=>g.selected=false);selGroup=null;redraw();
  }
});

// ─── MediaPipe ──────────────────────────────────────────────────
const video=document.getElementById('video');
const hc=document.getElementById('hand-canvas');
hc.width=220; hc.height=165;

const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.75,minTrackingConfidence:0.6});
hands.onResults(onHands);

lmsg.textContent='Kamera ruxsati so\'ralmoqda…';
navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}})
.then(stream=>{
  video.srcObject=stream;
  lmsg.textContent='Model yuklanmoqda…';
  const cam=new Camera(video,{
    onFrame:async()=>{await hands.send({image:video});},
    width:640,height:480
  });
  cam.start();
  setTimeout(()=>{
    loadEl.style.transition='opacity .7s';
    loadEl.style.opacity='0';
    setTimeout(()=>loadEl.style.display='none',700);
  },2500);
})
.catch(err=>{lmsg.textContent='Kamera xatosi: '+err.message;});

cursor.style.background=color;
redraw();
</script>
</body>
</html>
