
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; }
#root { position: relative; width: 100%; height: 520px; overflow: hidden; background: #0a0a0a; border-radius: 12px; font-family: 'Courier New', monospace; }
#videoEl { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.35; transform: scaleX(-1); }
#drawCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
#ui { position: absolute; right: 12px; top: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 10; }
.color-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
.color-btn.active { border-color: #fff; transform: scale(1.3); }
.tool-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 11px; padding: 6px 8px; border-radius: 6px; cursor: pointer; text-align: center; transition: background 0.15s; white-space: nowrap; }
.tool-btn:hover { background: rgba(255,255,255,0.2); }
.tool-btn.active { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.6); }
#status { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: 11px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px; z-index: 10; pointer-events: none; }
#mode-label { position: absolute; top: 12px; left: 12px; color: rgba(255,255,255,0.7); font-size: 11px; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 20px; z-index: 10; }
#cursor { position: absolute; width: 16px; height: 16px; border-radius: 50%; border: 2px solid white; transform: translate(-50%,-50%); pointer-events: none; z-index: 20; transition: background 0.1s; display: none; }
</style>

<div id="root">
  <video id="videoEl" autoplay playsinline muted></video>
  <canvas id="drawCanvas"></canvas>
  <div id="cursor"></div>
  <div id="mode-label">✍️ DRAW MODE</div>
  <div id="ui">
    <div class="color-btn active" data-color="#00ffcc" style="background:#00ffcc"></div>
    <div class="color-btn" data-color="#ff3cac" style="background:#ff3cac"></div>
    <div class="color-btn" data-color="#ffd700" style="background:#ffd700"></div>
    <div class="color-btn" data-color="#4fc3f7" style="background:#4fc3f7"></div>
    <div class="color-btn" data-color="#ff6b35" style="background:#ff6b35"></div>
    <div class="color-btn" data-color="#ffffff" style="background:#fff"></div>
    <hr style="border-color:rgba(255,255,255,0.2); margin: 2px 0;">
    <button class="tool-btn" id="btn-clear">CLEAR</button>
    <button class="tool-btn" id="btn-flip-h">FLIP H</button>
    <button class="tool-btn" id="btn-flip-v">FLIP V</button>
    <button class="tool-btn" id="btn-rotate">ROT 90°</button>
    <button class="tool-btn" id="btn-size-up">SIZE +</button>
    <button class="tool-btn" id="btn-size-dn">SIZE -</button>
  </div>
  <div id="status">Starting camera…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"></script>
<script>
const video = document.getElementById('videoEl');
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
const statusEl = document.getElementById('status');
const modeLabel = document.getElementById('mode-label');

let W, H;
function resize() {
  const root = document.getElementById('root');
  W = canvas.width = root.offsetWidth;
  H = canvas.height = root.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

let currentColor = '#00ffcc';
let brushSize = 4;
let strokes = [];
let currentStroke = null;
let isDrawing = false;
let lastPinch = false;
let rotation = 0;
let flipH = false, flipV = false;

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = btn.dataset.color;
  });
});

document.getElementById('btn-clear').addEventListener('click', () => { strokes = []; currentStroke = null; redraw(); });
document.getElementById('btn-flip-h').addEventListener('click', () => { flipH = !flipH; redraw(); });
document.getElementById('btn-flip-v').addEventListener('click', () => { flipV = !flipV; redraw(); });
document.getElementById('btn-rotate').addEventListener('click', () => { rotation = (rotation + 90) % 360; redraw(); });
document.getElementById('btn-size-up').addEventListener('click', () => { brushSize = Math.min(brushSize + 2, 20); });
document.getElementById('btn-size-dn').addEventListener('click', () => { brushSize = Math.max(brushSize - 2, 1); });

function getLandmarkPos(lm) {
  const x = (1 - lm.x) * W;
  const y = lm.y * H;
  return { x, y };
}

function fingerExtended(lms, tip, pip) {
  return lms[tip].y < lms[pip].y;
}

function isPinching(lms) {
  const thumb = getLandmarkPos(lms[4]);
  const index = getLandmarkPos(lms[8]);
  const dx = thumb.x - index.x, dy = thumb.y - index.y;
  return Math.sqrt(dx*dx + dy*dy) < 35;
}

function countExtended(lms) {
  let c = 0;
  [[8,6],[12,10],[16,14],[20,18]].forEach(([t,p]) => { if (fingerExtended(lms,t,p)) c++; });
  return c;
}

function drawGlow(sctx, pts, color, size) {
  if (pts.length < 2) return;
  sctx.save();
  sctx.lineCap = 'round';
  sctx.lineJoin = 'round';
  sctx.shadowColor = color;
  sctx.shadowBlur = size * 4;
  sctx.strokeStyle = color;
  sctx.lineWidth = size;
  sctx.globalAlpha = 0.9;
  sctx.beginPath();
  sctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) sctx.lineTo(pts[i].x, pts[i].y);
  sctx.stroke();
  sctx.shadowBlur = size * 8;
  sctx.lineWidth = size * 0.4;
  sctx.globalAlpha = 0.4;
  sctx.stroke();
  sctx.restore();
}

function redraw() {
  ctx.clearRect(0, 0, W, H);
  if (strokes.length === 0) return;
  
  ctx.save();
  ctx.translate(W/2, H/2);
  if (rotation) ctx.rotate(rotation * Math.PI / 180);
  if (flipH) ctx.scale(-1, 1);
  if (flipV) ctx.scale(1, -1);
  ctx.translate(-W/2, -H/2);
  
  strokes.forEach(s => drawGlow(ctx, s.pts, s.color, s.size));
  if (currentStroke) drawGlow(ctx, currentStroke.pts, currentStroke.color, currentStroke.size);
  
  ctx.restore();
}

function onResults(results) {
  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    cursor.style.display = 'none';
    statusEl.textContent = '✋ Show your hand to start';
    if (isDrawing) { if (currentStroke) { strokes.push(currentStroke); currentStroke = null; } isDrawing = false; }
    return;
  }

  const lms = results.multiHandLandmarks[0];
  const tip = getLandmarkPos(lms[8]);
  
  cursor.style.display = 'block';
  cursor.style.left = tip.x + 'px';
  cursor.style.top = tip.y + 'px';
  cursor.style.borderColor = currentColor;
  cursor.style.boxShadow = `0 0 8px ${currentColor}`;

  const pinching = isPinching(lms);
  const extended = countExtended(lms);
  
  if (pinching) {
    if (!lastPinch) {
      currentStroke = { pts: [tip], color: currentColor, size: brushSize };
      isDrawing = true;
    } else if (currentStroke) {
      currentStroke.pts.push(tip);
    }
    modeLabel.textContent = '✍️ DRAWING';
    statusEl.textContent = 'Pinch to draw — release to lift pen';
  } else {
    if (lastPinch && currentStroke) {
      strokes.push(currentStroke);
      currentStroke = null;
      isDrawing = false;
    }
    if (extended >= 4) {
      modeLabel.textContent = '🖐 MOVE MODE';
      statusEl.textContent = 'Open hand — pinch index+thumb to draw';
    } else {
      modeLabel.textContent = '✌️ HOVER';
      statusEl.textContent = 'Pinch index+thumb to start drawing';
    }
  }

  lastPinch = pinching;
  redraw();
}

async function init() {
  statusEl.textContent = 'Loading hand tracking…';
  
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
    video.srcObject = stream;
    statusEl.textContent = 'Camera ready — loading AI…';

    const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}` });
    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.6 });
    hands.onResults(onResults);

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 640, height: 480
    });
    camera.start();
    statusEl.textContent = '✋ Show your hand to start';
  } catch(e) {
    statusEl.textContent = '⚠️ Camera access denied — please allow camera';
    console.error(e);
  }
}

init();
</script>
