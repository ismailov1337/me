<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Air Write</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body,#root{width:100%;height:100%;background:#0b0b0f;overflow:hidden}
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&display=swap');
  body{font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useRef, useState, useCallback } = React;

// ─── Constants ───────────────────────────────────────────────────
const COLORS = [
  { hex:'#00ffcc', label:'Cyan' },
  { hex:'#ff3cac', label:'Pink' },
  { hex:'#ffd700', label:'Gold' },
  { hex:'#4fc3f7', label:'Blue' },
  { hex:'#ff6b35', label:'Orange' },
  { hex:'#ffffff', label:'White' },
];

const SMOOTHING = 0.38; // lower = smoother but laggier
const PINCH_THRESHOLD = 0.18; // ratio relative to hand size

// ─── Lerp smoothing ──────────────────────────────────────────────
function lerp(a, b, t) { return a + (b - a) * t; }

// ─── Draw neon stroke on canvas ─────────────────────────────────
function drawNeonPath(ctx, pts, color, size) {
  if (pts.length < 2) return;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // outer glow
  ctx.shadowColor = color;
  ctx.shadowBlur = size * 6;
  ctx.strokeStyle = color;
  ctx.lineWidth = size * 0.5;
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const mx = (pts[i-1].x + pts[i].x) / 2;
    const my = (pts[i-1].y + pts[i].y) / 2;
    ctx.quadraticCurveTo(pts[i-1].x, pts[i-1].y, mx, my);
  }
  ctx.stroke();

  // core line
  ctx.shadowBlur = size * 2;
  ctx.lineWidth = size;
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const mx = (pts[i-1].x + pts[i].x) / 2;
    const my = (pts[i-1].y + pts[i].y) / 2;
    ctx.quadraticCurveTo(pts[i-1].x, pts[i-1].y, mx, my);
  }
  ctx.stroke();

  ctx.restore();
}

// ─── Main App ────────────────────────────────────────────────────
function App() {
  const videoRef   = useRef(null);
  const canvasRef  = useRef(null);
  const overlayRef = useRef(null); // hand skeleton preview

  // mutable state via refs (no re-render needed every frame)
  const strokesRef      = useRef([]);  // [{pts,color,size}]
  const liveRef         = useRef(null);
  const smoothPosRef    = useRef(null);
  const prevPinchRef    = useRef(false);
  const colorRef        = useRef(COLORS[0].hex);
  const sizeRef         = useRef(5);

  // React UI state
  const [color,    setColor]  = useState(COLORS[0].hex);
  const [brushSz,  setBrushSz]= useState(5);
  const [status,   setStatus] = useState('Kamera yuklanmoqda…');
  const [mode,     setMode]   = useState('HOVERING');
  const [ready,    setReady]  = useState(false);

  // keep refs in sync
  useEffect(()=>{ colorRef.current = color; },[color]);
  useEffect(()=>{ sizeRef.current  = brushSz; },[brushSz]);

  // ── Full redraw ──────────────────────────────────────────────
  const redraw = useCallback(() => {
    const cv = canvasRef.current;
    if (!cv) return;
    const ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, cv.width, cv.height);

    for (const s of strokesRef.current) drawNeonPath(ctx, s.pts, s.color, s.size);
    if (liveRef.current) drawNeonPath(ctx, liveRef.current.pts, liveRef.current.color, liveRef.current.size);
  }, []);

  // ── Resize handler ───────────────────────────────────────────
  useEffect(() => {
    function resize() {
      const cv = canvasRef.current;
      const ov = overlayRef.current;
      if (!cv || !ov) return;
      cv.width  = window.innerWidth;
      cv.height = window.innerHeight;
      ov.width  = window.innerWidth;
      ov.height = window.innerHeight;
      redraw();
    }
    resize();
    window.addEventListener('resize', resize);
    return () => window.removeEventListener('resize', resize);
  }, [redraw]);

  // ── MediaPipe hand results handler ──────────────────────────
  const onResults = useCallback((results) => {
    const cv = canvasRef.current;
    const ov = overlayRef.current;
    if (!cv || !ov) return;

    const W = cv.width, H = cv.height;

    // Draw hand skeleton on overlay canvas
    const octx = ov.getContext('2d');
    octx.clearRect(0, 0, W, H);

    if (!results.multiHandLandmarks?.length) {
      // hand lost → finalize any live stroke
      if (liveRef.current?.pts.length > 3) {
        strokesRef.current.push(liveRef.current);
      }
      liveRef.current   = null;
      prevPinchRef.current = false;
      smoothPosRef.current = null;
      setMode('NO HAND');
      setStatus('✋ Qo\'lingizni ko\'rsating');
      redraw();
      return;
    }

    const lms = results.multiHandLandmarks[0];

    // Convert landmark to screen coords (mirrored)
    function lp(i) { return { x: (1 - lms[i].x) * W, y: lms[i].y * H }; }

    const indexTip   = lp(8);
    const indexPip   = lp(6);
    const thumbTip   = lp(4);
    const middleTip  = lp(12);
    const middlePip  = lp(10);
    const ringTip    = lp(16);
    const ringPip    = lp(14);
    const pinkyTip   = lp(20);
    const wrist      = lp(0);

    // hand size for normalizing distances
    const handSize = Math.hypot(middleTip.x - wrist.x, middleTip.y - wrist.y);

    // pinch ratio
    const pinchDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
    const pinchRatio = pinchDist / Math.max(handSize, 1);
    const isPinch = pinchRatio < PINCH_THRESHOLD;

    // finger extension
    function extended(tip, pip) { return tip.y < pip.y - handSize * 0.03; }
    const idxUp   = extended(indexTip,  indexPip);
    const midUp   = extended(middleTip, middlePip);
    const ringUp  = extended(ringTip,   ringPip);

    // Smooth cursor position
    if (!smoothPosRef.current) smoothPosRef.current = { ...indexTip };
    smoothPosRef.current.x = lerp(smoothPosRef.current.x, indexTip.x, SMOOTHING);
    smoothPosRef.current.y = lerp(smoothPosRef.current.y, indexTip.y, SMOOTHING);
    const { x: fx, y: fy } = smoothPosRef.current;

    // Draw skeleton overlay
    octx.save();
    octx.strokeStyle = 'rgba(255,255,255,0.25)';
    octx.lineWidth = 1;
    const CONN = Hands.HAND_CONNECTIONS || [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],[0,17]
    ];
    for (const [a,b] of CONN) {
      const pa = lp(a), pb = lp(b);
      octx.beginPath(); octx.moveTo(pa.x,pa.y); octx.lineTo(pb.x,pb.y); octx.stroke();
    }
    for (let i = 0; i < 21; i++) {
      const p = lp(i);
      octx.beginPath();
      octx.arc(p.x, p.y, i===8?6:3, 0, Math.PI*2);
      octx.fillStyle = i===8 ? colorRef.current : 'rgba(255,255,255,0.5)';
      octx.shadowColor = i===8 ? colorRef.current : 'transparent';
      octx.shadowBlur  = i===8 ? 10 : 0;
      octx.fill();
    }
    octx.restore();

    // ── Gesture → action ────────────────────────────────────────
    if (isPinch && idxUp) {
      // DRAWING — pinch while index up
      setMode('DRAWING ✏️');
      setStatus('Pinch bosib yozyapsiz — qo\'ling');

      if (!prevPinchRef.current) {
        // start new stroke
        liveRef.current = { pts: [{ x: fx, y: fy }], color: colorRef.current, size: sizeRef.current };
      } else if (liveRef.current) {
        const pts = liveRef.current.pts;
        const last = pts[pts.length - 1];
        // only add point if moved enough (debounce jitter)
        if (Math.hypot(fx - last.x, fy - last.y) > 1.5) {
          pts.push({ x: fx, y: fy });
        }
      }
    } else {
      // Released pinch → finalize stroke
      if (prevPinchRef.current && liveRef.current?.pts.length > 3) {
        strokesRef.current.push(liveRef.current);
        liveRef.current = null;
      }

      if (!isPinch && idxUp && !midUp) {
        setMode('READY ☝️');
        setStatus('Pinch qiling (bosh + ko\'rsatkich) — yozish uchun');
      } else if (idxUp && midUp && !ringUp) {
        setMode('✌️ SELECT');
        setStatus('Ikki barmog\' — tanlov rejimi');
      } else if (!idxUp) {
        setMode('🖐 HOVERING');
        setStatus('Ko\'rsatkich barmog\'ingizni ko\'taring');
      } else {
        setMode('HOVERING');
        setStatus('Ko\'rsatkich barmog\'ingizni ko\'taring');
      }
    }

    prevPinchRef.current = isPinch;
    redraw();
  }, [redraw]);

  // ── Init camera + MediaPipe ──────────────────────────────────
  useEffect(() => {
    let camera = null;
    let hands  = null;

    async function init() {
      try {
        setStatus('Kamera ruxsati so\'ralmoqda…');
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 1280, height: 720 }
        });
        videoRef.current.srcObject = stream;
        setStatus('Model yuklanmoqda…');

        hands = new Hands({
          locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
        });
        hands.setOptions({
          maxNumHands: 1,
          modelComplexity: 1,
          minDetectionConfidence: 0.8,
          minTrackingConfidence: 0.7,
        });
        hands.onResults(onResults);

        camera = new Camera(videoRef.current, {
          onFrame: async () => { await hands.send({ image: videoRef.current }); },
          width: 1280, height: 720
        });
        camera.start();

        setTimeout(() => {
          setReady(true);
          setStatus('✋ Qo\'lingizni ko\'rsating');
        }, 2000);
      } catch(e) {
        setStatus('⚠️ Kamera xatosi: ' + e.message);
        console.error(e);
      }
    }
    init();
    return () => { camera?.stop(); hands?.close(); };
  }, [onResults]);

  // ── UI actions ───────────────────────────────────────────────
  const undo  = () => { strokesRef.current.pop(); redraw(); };
  const clear = () => { strokesRef.current = []; liveRef.current = null; redraw(); };

  const modeColor = mode.includes('DRAWING') ? '#00ffcc'
                  : mode.includes('SELECT')  ? '#4fc3f7'
                  : 'rgba(255,255,255,0.4)';

  return (
    <div style={{ position:'relative', width:'100vw', height:'100vh', background:'#0b0b0f', overflow:'hidden' }}>

      {/* Video bg — faint */}
      <video
        ref={videoRef}
        autoPlay muted playsInline
        style={{
          position:'absolute', inset:0, width:'100%', height:'100%',
          objectFit:'cover', transform:'scaleX(-1)',
          opacity: ready ? 0.18 : 0, transition:'opacity 1s',
          pointerEvents:'none',
        }}
      />

      {/* Drawing canvas */}
      <canvas
        ref={canvasRef}
        style={{ position:'absolute', inset:0, pointerEvents:'none' }}
      />

      {/* Hand skeleton overlay */}
      <canvas
        ref={overlayRef}
        style={{ position:'absolute', inset:0, pointerEvents:'none', opacity:0.85 }}
      />

      {/* Loading screen */}
      {!ready && (
        <div style={{
          position:'absolute', inset:0, display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', gap:20,
          background:'rgba(11,11,15,0.95)', zIndex:100,
        }}>
          <div style={{ fontSize:32, letterSpacing:'.3em', color:'rgba(255,255,255,.8)', fontWeight:300 }}>
            AIR WRITE
          </div>
          <div style={{
            width:36, height:36, border:'1.5px solid rgba(255,255,255,.1)',
            borderTopColor:'rgba(0,255,204,.7)', borderRadius:'50%',
            animation:'spin 1s linear infinite',
          }}/>
          <div style={{ fontSize:11, letterSpacing:'.15em', color:'rgba(255,255,255,.35)', textTransform:'uppercase' }}>
            {status}
          </div>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      )}

      {/* Top-left mode badge */}
      <div style={{
        position:'absolute', top:16, left:16, zIndex:20,
        fontSize:11, letterSpacing:'.12em', textTransform:'uppercase',
        color: modeColor, background:'rgba(0,0,0,0.6)',
        padding:'5px 14px', borderRadius:100,
        border:`0.5px solid ${modeColor}40`,
        transition:'color .3s, border-color .3s',
        fontWeight:600,
      }}>
        {mode}
      </div>

      {/* Right toolbar */}
      <div style={{
        position:'absolute', right:16, top:'50%', transform:'translateY(-50%)',
        display:'flex', flexDirection:'column', gap:10, zIndex:20,
        background:'rgba(15,15,20,0.8)', backdropFilter:'blur(12px)',
        border:'0.5px solid rgba(255,255,255,0.08)',
        borderRadius:16, padding:'14px 10px',
      }}>
        {/* Colors */}
        {COLORS.map(c => (
          <button
            key={c.hex}
            title={c.label}
            onClick={() => setColor(c.hex)}
            style={{
              width:28, height:28, borderRadius:'50%',
              background: c.hex,
              border: color === c.hex ? '2.5px solid white' : '2px solid rgba(255,255,255,0.15)',
              cursor:'pointer', transition:'transform .15s, border .15s',
              transform: color === c.hex ? 'scale(1.3)' : 'scale(1)',
              boxShadow: color === c.hex ? `0 0 10px ${c.hex}80` : 'none',
            }}
          />
        ))}

        <div style={{ height:0.5, background:'rgba(255,255,255,0.1)', margin:'4px 0' }}/>

        {/* Brush size */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
          <button onClick={() => setBrushSz(s => Math.min(s+2, 24))} style={btnStyle}>+</button>
          <div style={{
            width:28, height:28, borderRadius:'50%',
            background: color,
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize: Math.max(8, brushSz*1.2), color:'#000', fontWeight:600,
            boxShadow:`0 0 8px ${color}60`,
            flexShrink:0,
          }}/>
          <button onClick={() => setBrushSz(s => Math.max(s-2, 1))} style={btnStyle}>−</button>
        </div>

        <div style={{ height:0.5, background:'rgba(255,255,255,0.1)', margin:'4px 0' }}/>

        {/* Undo / Clear */}
        <button onClick={undo}  style={btnStyle} title="Undo">↩</button>
        <button onClick={clear} style={{...btnStyle, color:'#ff6b6b'}} title="Clear">✕</button>
      </div>

      {/* Bottom status */}
      <div style={{
        position:'absolute', bottom:20, left:'50%', transform:'translateX(-50%)',
        fontSize:11, letterSpacing:'.1em', textTransform:'uppercase',
        color:'rgba(255,255,255,.3)', background:'rgba(0,0,0,0.5)',
        padding:'5px 16px', borderRadius:100, zIndex:20,
        pointerEvents:'none', whiteSpace:'nowrap',
        transition:'opacity .4s',
        opacity: ready ? 1 : 0,
      }}>
        {status}
      </div>

      {/* Gesture guide — top center */}
      <div style={{
        position:'absolute', top:16, left:'50%', transform:'translateX(-50%)',
        fontSize:11, letterSpacing:'.08em',
        color:'rgba(255,255,255,.2)',
        pointerEvents:'none', zIndex:20,
        whiteSpace:'nowrap',
        opacity: ready ? 1 : 0, transition:'opacity 1s',
      }}>
        ☝️ Barmog'ni ko'tar · 🤏 Pinch = Yoz · ✌️ = Tanla
      </div>
    </div>
  );
}

const btnStyle = {
  background:'rgba(255,255,255,0.06)',
  border:'0.5px solid rgba(255,255,255,0.15)',
  color:'rgba(255,255,255,0.7)',
  width:28, height:28,
  borderRadius:8,
  fontSize:14, fontWeight:600,
  cursor:'pointer',
  display:'flex', alignItems:'center', justifyContent:'center',
  fontFamily:'JetBrains Mono, monospace',
  transition:'background .15s',
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
