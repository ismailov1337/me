<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Blackboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #app {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #blackboard {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    cursor: none;
  }

  #video {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 150px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.15);
    object-fit: cover;
    transform: scaleX(-1);
    z-index: 10;
    opacity: 0.85;
  }

  #overlay-canvas {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 200px;
    height: 150px;
    border-radius: 12px;
    transform: scaleX(-1);
    z-index: 11;
    pointer-events: none;
  }

  #ui {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 20;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(8px);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    padding: 10px 18px;
  }

  .color-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .color-btn:hover { transform: scale(1.2); }
  .color-btn.active { border-color: white; transform: scale(1.15); }

  .sep {
    width: 0.5px;
    height: 20px;
    background: rgba(255,255,255,0.2);
  }

  .tool-btn {
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    padding: 5px 12px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.1); color: white; }
  .tool-btn.active { background: rgba(255,255,255,0.15); color: white; border-color: rgba(255,255,255,0.4); }

  #size-slider {
    -webkit-appearance: none;
    width: 80px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.2);
    outline: none;
  }
  #size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: white;
    cursor: pointer;
  }

  #status {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    z-index: 20;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  #gesture-hint {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    z-index: 20;
    pointer-events: none;
    text-align: center;
    line-height: 1.8;
  }

  #cursor-dot {
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 50;
    transform: translate(-50%, -50%);
    transition: width 0.1s, height 0.1s;
    mix-blend-mode: screen;
  }

  #loading-screen {
    position: absolute;
    inset: 0;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 24px;
  }

  #loading-screen h1 {
    color: rgba(255,255,255,0.85);
    font-size: 28px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.2em;
    font-weight: normal;
  }

  #loading-screen p {
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .loader {
    width: 40px;
    height: 40px;
    border: 1.5px solid rgba(255,255,255,0.1);
    border-top-color: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #chalk-texture {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="blackboard"></canvas>
  <div id="chalk-texture"></div>

  <div id="loading-screen">
    <h1>AIR BOARD</h1>
    <div class="loader"></div>
    <p id="load-msg">Loading hand tracking model…</p>
  </div>

  <div id="ui">
    <div class="color-btn active" style="background:#ffffff" data-color="#ffffff" title="White chalk"></div>
    <div class="color-btn" style="background:#f4d03f" data-color="#f4d03f" title="Yellow"></div>
    <div class="color-btn" style="background:#5dade2" data-color="#5dade2" title="Blue"></div>
    <div class="color-btn" style="background:#58d68d" data-color="#58d68d" title="Green"></div>
    <div class="color-btn" style="background:#ec7063" data-color="#ec7063" title="Red"></div>
    <div class="color-btn" style="background:#a569bd" data-color="#a569bd" title="Purple"></div>
    <div class="sep"></div>
    <button class="tool-btn active" id="btn-draw" title="Draw mode">Draw</button>
    <button class="tool-btn" id="btn-erase" title="Erase mode">Erase</button>
    <div class="sep"></div>
    <input type="range" id="size-slider" min="2" max="30" value="8" title="Brush size">
    <div class="sep"></div>
    <button class="tool-btn" id="btn-clear" title="Clear board">Clear</button>
  </div>

  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay-canvas"></canvas>

  <div id="cursor-dot"></div>

  <div id="status">Raise index finger to draw · Pinch to pause</div>
  <div id="gesture-hint" id="gesture-hint"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<script>
const canvas = document.getElementById('blackboard');
const ctx = canvas.getContext('2d');
const video = document.getElementById('video');
const overlayCanvas = document.getElementById('overlay-canvas');
const overlayCtx = overlayCanvas.getContext('2d');
const cursorDot = document.getElementById('cursor-dot');
const statusEl = document.getElementById('status');
const loadScreen = document.getElementById('loading-screen');
const loadMsg = document.getElementById('load-msg');

let currentColor = '#ffffff';
let brushSize = 8;
let mode = 'draw';
let isDrawing = false;
let lastX = null, lastY = null;
let smoothX = null, smoothY = null;

function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  canvas.width = w; canvas.height = h;
  ctx.putImageData(imageData, 0, 0);
  drawChalkGrid();
}

function drawChalkGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  const step = 40;
  for (let y = step; y < canvas.height; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
  ctx.restore();
}

window.addEventListener('resize', resize);
resize();
drawChalkGrid();

function chalkStroke(x, y, px, py, color, size, erasing) {
  ctx.save();
  if (erasing) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.lineWidth = size * 3.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(x, y);
    ctx.stroke();
  } else {
    ctx.globalCompositeOperation = 'source-over';
    const r = parseInt(color.slice(1,3),16);
    const g = parseInt(color.slice(3,5),16);
    const b = parseInt(color.slice(5,7),16);
    for (let i = 0; i < 3; i++) {
      const jx = x + (Math.random()-0.5)*size*0.4;
      const jy = y + (Math.random()-0.5)*size*0.4;
      const jpx = px + (Math.random()-0.5)*size*0.4;
      const jpy = py + (Math.random()-0.5)*size*0.4;
      const alpha = 0.5 + Math.random() * 0.4;
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.lineWidth = size * (0.5 + Math.random()*0.6);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(jpx, jpy);
      ctx.lineTo(jx, jy);
      ctx.stroke();
    }
  }
  ctx.restore();
}

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = btn.dataset.color;
    cursorDot.style.background = currentColor;
    if (mode === 'erase') {
      mode = 'draw';
      document.getElementById('btn-draw').classList.add('active');
      document.getElementById('btn-erase').classList.remove('active');
    }
  });
});

document.getElementById('btn-draw').addEventListener('click', () => {
  mode = 'draw';
  document.getElementById('btn-draw').classList.add('active');
  document.getElementById('btn-erase').classList.remove('active');
});

document.getElementById('btn-erase').addEventListener('click', () => {
  mode = 'erase';
  document.getElementById('btn-erase').classList.add('active');
  document.getElementById('btn-draw').classList.remove('active');
});

document.getElementById('btn-clear').addEventListener('click', () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawChalkGrid();
});

document.getElementById('size-slider').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
  const s = brushSize + 8;
  cursorDot.style.width = s + 'px';
  cursorDot.style.height = s + 'px';
});

cursorDot.style.background = currentColor;

function lerp(a, b, t) { return a + (b - a) * t; }

function dist(x1, y1, x2, y2) {
  return Math.sqrt((x2-x1)**2 + (y2-y1)**2);
}

function getLandmarkPos(lm, w, h) {
  return { x: (1 - lm.x) * w, y: lm.y * h };
}

let handsReady = false;

const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.75,
  minTrackingConfidence: 0.6,
});

hands.onResults(results => {
  if (!handsReady) return;

  const W = canvas.width, H = canvas.height;
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    isDrawing = false;
    lastX = null; lastY = null;
    smoothX = null; smoothY = null;
    cursorDot.style.opacity = '0';
    return;
  }

  const lm = results.multiHandLandmarks[0];

  const indexTip = getLandmarkPos(lm[8], W, H);
  const indexMid = getLandmarkPos(lm[6], W, H);
  const thumbTip = getLandmarkPos(lm[4], W, H);
  const middleTip = getLandmarkPos(lm[12], W, H);
  const ringTip = getLandmarkPos(lm[16], W, H);
  const pinkyTip = getLandmarkPos(lm[20], W, H);
  const wrist = getLandmarkPos(lm[0], W, H);

  if (smoothX === null) { smoothX = indexTip.x; smoothY = indexTip.y; }
  smoothX = lerp(smoothX, indexTip.x, 0.4);
  smoothY = lerp(smoothY, indexTip.y, 0.4);

  const pinchDist = dist(thumbTip.x, thumbTip.y, indexTip.x, indexTip.y);
  const handSpan = dist(wrist.x, wrist.y, middleTip.x, middleTip.y);
  const pinchRatio = pinchDist / (handSpan || 1);

  const indexExtended = indexTip.y < indexMid.y - handSpan * 0.05;
  const middleExtended = middleTip.y < getLandmarkPos(lm[10], W, H).y - handSpan * 0.05;
  const ringExtended = ringTip.y < getLandmarkPos(lm[14], W, H).y - handSpan * 0.05;
  const pinkyExtended = pinkyTip.y < getLandmarkPos(lm[18], W, H).y - handSpan * 0.05;

  const pinching = pinchRatio < 0.22;
  const shouldDraw = indexExtended && !pinching;

  cursorDot.style.left = smoothX + 'px';
  cursorDot.style.top = smoothY + 'px';
  cursorDot.style.opacity = '1';

  if (pinching) {
    cursorDot.style.background = 'rgba(255,255,255,0.4)';
    cursorDot.style.border = '2px solid white';
    isDrawing = false;
    lastX = null; lastY = null;
  } else if (shouldDraw) {
    const erasing = mode === 'erase';
    cursorDot.style.background = erasing ? 'rgba(255,255,255,0.15)' : currentColor;
    cursorDot.style.border = erasing ? '2px dashed rgba(255,255,255,0.5)' : 'none';

    if (lastX !== null) {
      chalkStroke(smoothX, smoothY, lastX, lastY, currentColor, brushSize, erasing);
    }
    lastX = smoothX; lastY = smoothY;
    isDrawing = true;
  } else {
    cursorDot.style.background = 'rgba(255,255,255,0.25)';
    cursorDot.style.border = '1.5px solid rgba(255,255,255,0.5)';
    isDrawing = false;
    lastX = null; lastY = null;
  }

  const scale = 200 / W;
  const ow = overlayCanvas.width, oh = overlayCanvas.height;
  overlayCtx.strokeStyle = 'rgba(255,255,255,0.5)';
  overlayCtx.lineWidth = 1;
  for (const conn of Hands.HAND_CONNECTIONS) {
    const a = lm[conn[0]], b = lm[conn[1]];
    overlayCtx.beginPath();
    overlayCtx.moveTo((1-a.x)*ow, a.y*oh);
    overlayCtx.lineTo((1-b.x)*ow, b.y*oh);
    overlayCtx.stroke();
  }
  for (let i = 0; i < lm.length; i++) {
    const p = lm[i];
    overlayCtx.beginPath();
    overlayCtx.arc((1-p.x)*ow, p.y*oh, 2.5, 0, Math.PI*2);
    overlayCtx.fillStyle = i === 8 ? currentColor : 'rgba(255,255,255,0.6)';
    overlayCtx.fill();
  }
});

async function startCamera() {
  loadMsg.textContent = 'Requesting camera access…';
  const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
  video.srcObject = stream;
  overlayCanvas.width = 200; overlayCanvas.height = 150;

  loadMsg.textContent = 'Starting hand detection…';

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 640, height: 480
  });
  camera.start();

  setTimeout(() => {
    handsReady = true;
    loadScreen.style.opacity = '0';
    loadScreen.style.transition = 'opacity 0.6s';
    setTimeout(() => loadScreen.style.display = 'none', 600);
  }, 2000);
}

loadMsg.textContent = 'Loading MediaPipe Hands…';
startCamera().catch(err => {
  loadMsg.textContent = 'Camera error: ' + err.message;
  console.error(err);
});

canvas.addEventListener('mousedown', e => {
  isDrawing = true;
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  cursorDot.style.left = e.clientX + 'px';
  cursorDot.style.top = e.clientY + 'px';
  if (isDrawing) {
    chalkStroke(e.clientX, e.clientY, lastX, lastY, currentColor, brushSize, mode === 'erase');
    lastX = e.clientX; lastY = e.clientY;
  }
});
canvas.addEventListener('mouseup', () => { isDrawing = false; lastX = null; lastY = null; });
canvas.addEventListener('mouseleave', () => { isDrawing = false; cursorDot.style.opacity = '0'; });
</script>
</body>
</html>
