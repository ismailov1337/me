<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face AR Neon Mesh</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; color: #fff; }
  h1 { font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: #888; margin-bottom: 16px; }
  #container { position: relative; width: 640px; height: 480px; border-radius: 8px; overflow: hidden; }
  #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
  #status { position: absolute; top: 10px; left: 10px; font-size: 11px; color: #0f0; letter-spacing: 1px; z-index: 10; }
  #controls { margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button { background: transparent; border: 1px solid #333; color: #aaa; padding: 8px 18px; font-family: monospace; font-size: 12px; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; border-radius: 4px; transition: all 0.2s; }
  button:hover, button.active { border-color: #0ff; color: #0ff; }
  #stats { position: absolute; top: 10px; right: 10px; font-size: 11px; color: #0f0; text-align: right; z-index: 10; }
  #fps-display { font-size: 11px; color: #555; margin-top: 8px; }
</style>
</head>
<body>
<h1>Face AR &mdash; Neon Mesh</h1>
<div id="container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas" width="640" height="480"></canvas>
  <div id="status">Initializing...</div>
  <div id="stats"></div>
</div>
<div id="controls">
  <button id="btn-mesh" class="active" onclick="toggleMode('mesh')">Mesh</button>
  <button id="btn-contour" onclick="toggleMode('contour')">Contour</button>
  <button id="btn-iris" onclick="toggleMode('iris')">Iris</button>
  <button id="btn-all" onclick="toggleMode('all')">All</button>
  <button id="btn-color" onclick="cycleColor()">Color Cycle</button>
</div>
<div id="fps-display">FPS: --</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const statsEl = document.getElementById('stats');
const fpsEl = document.getElementById('fps-display');

let mode = 'mesh';
let colorScheme = 0;
let frameCount = 0;
let lastTime = performance.now();
let faceDetected = false;

const colorSchemes = [
  { mesh: '#ff2d78', contour: '#00e5ff', iris: '#ffe600', glow: 'rgba(255,45,120,0.15)' },
  { mesh: '#00ff9f', contour: '#ff00ff', iris: '#00cfff', glow: 'rgba(0,255,159,0.12)' },
  { mesh: '#ff9100', contour: '#00ff44', iris: '#ff2dff', glow: 'rgba(255,145,0,0.12)' },
  { mesh: '#00cfff', contour: '#ff4d4d', iris: '#aaff00', glow: 'rgba(0,207,255,0.12)' },
];

function toggleMode(m) {
  mode = m;
  document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
}

function cycleColor() {
  colorScheme = (colorScheme + 1) % colorSchemes.length;
}

function drawNeonLine(x1, y1, x2, y2, color, width = 1, glow = 8) {
  ctx.save();
  ctx.shadowBlur = glow;
  ctx.shadowColor = color;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.restore();
}

function drawNeonPoint(x, y, color, r = 2) {
  ctx.save();
  ctx.shadowBlur = 12;
  ctx.shadowColor = color;
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function lm(landmarks, i) {
  return {
    x: landmarks[i].x * canvas.width,
    y: landmarks[i].y * canvas.height,
  };
}

function drawFaceMesh(landmarks) {
  const cs = colorSchemes[colorScheme];
  const W = canvas.width, H = canvas.height;

  // Face mesh tessellation — use MediaPipe's FACEMESH_TESSELATION connections
  if (mode === 'mesh' || mode === 'all') {
    for (const [a, b] of FACEMESH_TESSELATION) {
      const p1 = lm(landmarks, a);
      const p2 = lm(landmarks, b);
      drawNeonLine(p1.x, p1.y, p2.x, p2.y, cs.mesh, 0.5, 4);
    }
  }

  // Face oval / contour
  if (mode === 'contour' || mode === 'all') {
    const contour = FACEMESH_FACE_OVAL;
    for (const [a, b] of contour) {
      const p1 = lm(landmarks, a);
      const p2 = lm(landmarks, b);
      drawNeonLine(p1.x, p1.y, p2.x, p2.y, cs.contour, 1.5, 14);
    }
    // Lips
    for (const [a, b] of FACEMESH_LIPS) {
      const p1 = lm(landmarks, a);
      const p2 = lm(landmarks, b);
      drawNeonLine(p1.x, p1.y, p2.x, p2.y, cs.iris, 1.2, 10);
    }
  }

  // Irises
  if (mode === 'iris' || mode === 'all') {
    for (const [a, b] of FACEMESH_RIGHT_IRIS) {
      const p1 = lm(landmarks, a);
      const p2 = lm(landmarks, b);
      drawNeonLine(p1.x, p1.y, p2.x, p2.y, cs.iris, 2, 18);
    }
    for (const [a, b] of FACEMESH_LEFT_IRIS) {
      const p1 = lm(landmarks, a);
      const p2 = lm(landmarks, b);
      drawNeonLine(p1.x, p1.y, p2.x, p2.y, cs.iris, 2, 18);
    }
    // Eye contours
    for (const [a, b] of [...FACEMESH_RIGHT_EYE, ...FACEMESH_LEFT_EYE]) {
      const p1 = lm(landmarks, a);
      const p2 = lm(landmarks, b);
      drawNeonLine(p1.x, p1.y, p2.x, p2.y, cs.contour, 1, 12);
    }
  }

  // Key landmark dots
  const keyPoints = [1, 4, 6, 8, 10, 33, 133, 362, 263, 61, 291, 17, 0, 267, 37];
  for (const i of keyPoints) {
    const p = lm(landmarks, i);
    drawNeonPoint(p.x, p.y, cs.iris, 2.5);
  }
}

function onResults(results) {
  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastTime > 500) {
    fpsEl.textContent = 'FPS: ' + Math.round(frameCount / ((now - lastTime) / 1000));
    frameCount = 0;
    lastTime = now;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw dark overlay on video feed
  ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    faceDetected = true;
    statusEl.textContent = 'FACE DETECTED';
    statusEl.style.color = '#0f0';
    statsEl.textContent = `Landmarks: ${results.multiFaceLandmarks[0].length}\nFaces: ${results.multiFaceLandmarks.length}`;
    for (const landmarks of results.multiFaceLandmarks) {
      drawFaceMesh(landmarks);
    }
  } else {
    faceDetected = false;
    statusEl.textContent = 'SCANNING...';
    statusEl.style.color = '#f90';
    statsEl.textContent = '';
  }
}

async function init() {
  statusEl.textContent = 'Loading MediaPipe...';
  const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces: 2,
    refineLandmarks: true,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });

  faceMesh.onResults(onResults);

  const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, facingMode: 'user' } });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  statusEl.textContent = 'Camera active — scanning...';

  const camera = new Camera(video, {
    onFrame: async () => {
      await faceMesh.send({ image: video });
    },
    width: 640,
    height: 480,
  });
  camera.start();
}

init().catch(err => {
  statusEl.textContent = 'Error: ' + err.message;
  statusEl.style.color = '#f00';
  console.error(err);
});
</script>
</body>
</html>
