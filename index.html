<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sanjar's Blog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root[data-theme="dark"] {
          --bg: #0a0a0a;
          --bg2: rgba(10,10,10,0.8);
          --border: rgba(255,255,255,0.07);
          --border-strong: rgba(255,255,255,0.16);
          --text: #f0eeff;
          --muted: #555;
          --tagline: rgba(240,238,255,0.45);
          --icon: #444;
          --icon-hover: #fff;
          --btn-bg: #fff;
          --btn-text: #000;
          --btn-hover: #ddd;
          --btn-ghost-text: rgba(255,255,255,0.55);
          --btn-ghost-border: rgba(255,255,255,0.13);
          --btn-ghost-hover-text: #fff;
          --btn-ghost-hover-border: rgba(255,255,255,0.35);
          --btn-ghost-hover-bg: rgba(255,255,255,0.05);
          --ring: conic-gradient(#fff, #555, #fff, #555, #fff);
          --ring-inner: #0a0a0a;
          --avatar-bg: #1a1a1a;
          --avatar-text: #fff;
        }

        :root[data-theme="light"] {
          --bg: #f7f6f2;
          --bg2: rgba(247,246,242,0.88);
          --border: rgba(0,0,0,0.07);
          --border-strong: rgba(0,0,0,0.14);
          --text: #0a0a0a;
          --muted: #aaa;
          --tagline: rgba(10,10,10,0.45);
          --icon: #bbb;
          --icon-hover: #000;
          --btn-bg: #0a0a0a;
          --btn-text: #fff;
          --btn-hover: #222;
          --btn-ghost-text: rgba(0,0,0,0.55);
          --btn-ghost-border: rgba(0,0,0,0.13);
          --btn-ghost-hover-text: #000;
          --btn-ghost-hover-border: rgba(0,0,0,0.35);
          --btn-ghost-hover-bg: rgba(0,0,0,0.04);
          --ring: conic-gradient(#000, #bbb, #000, #bbb, #000);
          --ring-inner: #f7f6f2;
          --avatar-bg: #e8e8e4;
          --avatar-text: #000;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
          min-height: 100vh;
          background: var(--bg);
          color: var(--text);
          font-family: 'DM Sans', sans-serif;
          overflow-x: hidden;
          transition: background 0.4s, color 0.4s;
        }

        body::after {
          content: '';
          position: fixed; inset: 0; pointer-events: none; z-index: 0;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.022'/%3E%3C/svg%3E");
          background-size: 180px;
        }

        nav {
          position: relative; z-index: 10;
          display: flex; align-items: center; justify-content: space-between;
          padding: 22px 48px;
          border-bottom: 1px solid var(--border);
          background: var(--bg2);
          backdrop-filter: blur(12px);
          animation: fadeDown 0.5s ease both;
          transition: background 0.4s, border-color 0.4s;
        }

        @keyframes fadeDown {
          from { opacity:0; transform:translateY(-10px); }
          to   { opacity:1; transform:translateY(0); }
        }

        .nav-logo {
          font-weight: 600; font-size: 1rem;
          color: var(--text); transition: color 0.4s;
        }

        .nav-right { display: flex; align-items: center; gap: 10px; }

        .nav-channel {
          text-decoration: none;
          font-size: 0.82rem; font-weight: 600;
          padding: 7px 20px; border-radius: 40px;
          background: var(--btn-bg); color: var(--btn-text);
          transition: background 0.3s, color 0.3s, transform 0.2s;
        }
        .nav-channel:hover { background: var(--btn-hover); transform: translateY(-1px); }

        .toggle {
          width: 36px; height: 36px; border-radius: 50%;
          border: 1px solid var(--border-strong);
          background: transparent; color: var(--text);
          cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          font-size: 0.85rem; transition: all 0.25s;
        }
        .toggle:hover { background: rgba(128,128,128,0.08); transform: rotate(18deg); }

        main {
          position: relative; z-index: 1;
          display: flex; flex-direction: column; justify-content: center;
          min-height: calc(100vh - 65px - 44px);
          padding: 0 48px; max-width: 860px;
        }

        .hero { animation: fadeUp 0.65s 0.1s ease both; }

        @keyframes fadeUp {
          from { opacity:0; transform:translateY(24px); }
          to   { opacity:1; transform:translateY(0); }
        }

        .profile-row {
          display: flex; align-items: center;
          gap: 26px; margin-bottom: 28px;
        }

        .avatar-wrap {
          position: relative; flex-shrink: 0;
          width: 86px; height: 86px;
        }

        .avatar-ring {
          position: absolute; inset: -4px; border-radius: 50%;
          background: var(--ring);
          animation: spin 8s linear infinite;
          transition: background 0.4s;
        }
        .avatar-ring::after {
          content: ''; position: absolute; inset: 3px; border-radius: 50%;
          background: var(--ring-inner); transition: background 0.4s;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .avatar {
          position: relative; z-index: 1;
          width: 86px; height: 86px; border-radius: 50%;
          object-fit: cover; display: block;
          background: var(--avatar-bg); transition: background 0.4s;
        }

        .avatar-init {
          position: relative; z-index: 1;
          width: 86px; height: 86px; border-radius: 50%;
          background: var(--avatar-bg);
          display: flex; align-items: center; justify-content: center;
          font-family: 'Cormorant Garamond', serif;
          font-size: 2rem; font-weight: 700;
          color: var(--avatar-text); transition: all 0.4s;
        }

        .profile-info h1 {
          font-family: 'Cormorant Garamond', serif;
          font-size: 2.1rem; font-weight: 700;
          color: var(--text); line-height: 1.1;
          margin-bottom: 4px; transition: color 0.4s;
        }

        .profile-info .role {
          font-size: 0.9rem; color: var(--muted);
          font-weight: 400; margin-bottom: 14px; transition: color 0.4s;
        }

        .socials { display: flex; gap: 16px; }

        .socials a {
          color: var(--icon); font-size: 1.15rem;
          text-decoration: none;
          transition: color 0.2s, transform 0.2s;
        }
        .socials a:hover { color: var(--icon-hover); transform: translateY(-2px); }

        .tagline {
          font-size: 0.97rem; color: var(--tagline);
          font-weight: 300; line-height: 1.7;
          margin-bottom: 28px; max-width: 420px;
          transition: color 0.4s;
        }

        .cta-group { display: flex; gap: 12px; flex-wrap: wrap; }

        .btn {
          padding: 10px 26px; border-radius: 8px;
          font-family: 'DM Sans', sans-serif;
          font-size: 0.88rem; font-weight: 600;
          text-decoration: none; cursor: pointer;
          transition: all 0.22s; letter-spacing: 0.02em;
        }

        .btn-ghost {
          background: transparent;
          color: var(--btn-ghost-text);
          border: 1px solid var(--btn-ghost-border);
        }
        .btn-ghost:hover {
          border-color: var(--btn-ghost-hover-border);
          color: var(--btn-ghost-hover-text);
          background: var(--btn-ghost-hover-bg);
          transform: translateY(-2px);
        }

        footer {
          position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
          text-align: center; padding: 12px;
          font-size: 0.75rem; color: var(--muted);
          border-top: 1px solid var(--border);
          background: var(--bg2); backdrop-filter: blur(10px);
          transition: all 0.4s;
        }

        @media (max-width: 600px) {
          nav { padding: 18px 20px; }
          main { padding: 0 20px; min-height: calc(100vh - 60px - 44px); }
          .profile-info h1 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<nav>
    <span class="nav-logo">Sanjar's Blog</span>
    <div class="nav-right">
        <button class="toggle" onclick="toggleTheme()" title="Toggle theme">
            <i class="fas fa-sun" id="theme-icon"></i>
        </button>
        <a href="https://t.me/MrSanjarIsmailov" target="_blank" class="nav-channel">Channel</a>
    </div>
</nav>

<main>
    <div class="hero">

        <div class="profile-row">
            <div class="avatar-wrap">
                <div class="avatar-ring"></div>
                <img src="me.webp" alt="Sanjar Ismailov" class="avatar"
                     onerror="this.outerHTML='<div class=\'avatar-init\'>SI</div>'"/>
            </div>

            <div class="profile-info">
                <h1>Sanjar Ismailov</h1>
                <p class="role">Student, Software Engineer and Cyber Security Specialist</p>
                <div class="socials">
                    <a href="https://t.me/IsmailovSanjar"   target="_blank" title="Telegram"><i class="fab fa-telegram"></i></a>
                    <a href="https://x.com/chilluzbek"    target="_blank" title="X"><i class="fab fa-x-twitter"></i></a>
                    <a href="https://www.linkedin.com/in/sanjar-ismailov/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                    <a href="https://instagram.com/sanjar.ismailov1337"    target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="mailto:mrsanjarismailov@gmail.com" title="Email"><i class="fas fa-envelope"></i></a>
                </div>
            </div>
        </div>

        <p class="tagline">
            Nothing is impossible — only unexplored.
        </p>

        <div class="cta-group">
            <a href="about.html" class="btn btn-ghost">About Me</a>
        </div>

    </div>
</main>

<footer>Created by Sanjar Ismailov</footer>

<script>
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
    }
</script>
</body>
</html>
