<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>A Special Question 💌</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;min-height:100%;overflow-x:hidden;}
        body{
            min-height:100vh;
            background:#1a0a2e;
            display:flex;align-items:center;justify-content:center;
            font-family:'Georgia',serif;
            position:relative;
            padding:16px;
        }
        .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
        .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);}
        @keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
        .heart-bg{position:fixed;font-size:18px;opacity:.13;animation:floatUp var(--fd,8s) ease-in infinite var(--fdelay,0s);z-index:0;pointer-events:none;}
        @keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg);opacity:0}10%{opacity:.13}90%{opacity:.08}100%{transform:translateY(-10vh) rotate(30deg);opacity:0}}

        .card{
            position:relative;z-index:10;
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:20px;
            padding:2rem 1.5rem;
            width:100%;max-width:460px;
            text-align:center;
            backdrop-filter:blur(20px);
        }
        .rose{font-size:48px;display:block;margin-bottom:.75rem;animation:pulse 2s ease-in-out infinite;}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        h1{font-size:1.6rem;color:#f9d5e5;font-style:italic;margin-bottom:.6rem;line-height:1.3;}
        .subtitle{font-size:.95rem;color:rgba(255,220,235,.8);line-height:1.7;margin-bottom:1.5rem;}

        /* YES/NO buttons */
        .btn-group{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin-top:1.2rem;}
        .btn-yes{
            padding:13px 32px;border:none;border-radius:50px;
            font-size:1rem;font-family:'Georgia',serif;cursor:pointer;
            background:linear-gradient(135deg,#e91e8c,#c2185b);color:white;
            box-shadow:0 4px 18px rgba(233,30,140,.5);
            transition:transform .2s,box-shadow .2s;
            white-space:nowrap;
        }
        .btn-yes:hover{transform:scale(1.05);}
        .btn-no{
            padding:11px 26px;border-radius:50px;
            font-size:.95rem;font-family:'Georgia',serif;cursor:pointer;
            background:rgba(255,255,255,0.13);
            border:1.5px solid rgba(255,255,255,.65);
            color:rgba(255,255,255,.95);
            white-space:nowrap;
        }

        /* Calendar */
        #calendar-section{display:none;}
        #calendar-section h2{font-size:1.25rem;color:#f9d5e5;font-style:italic;margin-bottom:.4rem;}
        #calendar-section>p{color:rgba(255,220,235,.75);font-size:.88rem;margin-bottom:1.2rem;}
        .calendar{background:rgba(255,255,255,.05);border-radius:14px;padding:1rem;margin-bottom:1.2rem;}
        .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;color:#f9d5e5;font-size:.95rem;}
        .cal-nav{background:none;border:1px solid rgba(255,255,255,.25);color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
        .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;}
        .cal-day-name{color:rgba(255,200,220,.5);font-size:.65rem;padding-bottom:5px;}
        .cal-day{
            aspect-ratio:1;display:flex;align-items:center;justify-content:center;
            border-radius:50%;font-size:.78rem;color:rgba(255,255,255,.75);cursor:pointer;
        }
        .cal-day:hover:not(.empty):not(.past){background:rgba(233,30,140,.35);color:white;}
        .cal-day.empty{cursor:default;}
        .cal-day.past{opacity:.22;cursor:default;}
        .cal-day.today{border:1px solid rgba(233,30,140,.6);color:#f9d5e5;}
        .cal-day.selected{background:linear-gradient(135deg,#e91e8c,#c2185b);color:white;}

        /* Time */
        .time-section{margin-bottom:1.2rem;}
        .time-section label{color:rgba(255,220,235,.8);font-size:.85rem;display:block;margin-bottom:7px;}
        .time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
        .time-slot{
            background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
            border-radius:9px;padding:8px 3px;
            color:rgba(255,255,255,.7);font-size:.75rem;cursor:pointer;
            font-family:'Georgia',serif;
        }
        .time-slot:hover{background:rgba(233,30,140,.25);color:white;}
        .time-slot.selected{background:linear-gradient(135deg,#e91e8c,#c2185b);color:white;border-color:transparent;}

        .btn-confirm{
            background:linear-gradient(135deg,#e91e8c,#c2185b);color:white;
            border:none;border-radius:50px;padding:12px 36px;
            font-size:.95rem;font-family:'Georgia',serif;cursor:pointer;
            box-shadow:0 4px 18px rgba(233,30,140,.5);transition:transform .2s;
            width:100%;max-width:260px;
        }
        .btn-confirm:hover{transform:scale(1.04);}
        .btn-confirm:disabled{opacity:.35;cursor:not-allowed;transform:none;}

        /* Final */
        #final-section{display:none;}
        #final-section h2{font-size:1.3rem;color:#f9d5e5;font-style:italic;margin-bottom:.4rem;}
        .date-display{background:rgba(233,30,140,.12);border:1px solid rgba(233,30,140,.3);border-radius:14px;padding:1.2rem;margin:1.2rem 0;}
        .date-display p{color:rgba(255,220,235,.85);font-size:.95rem;margin-bottom:6px;}
        .date-display .highlight{font-size:1.1rem;color:#f9d5e5;font-weight:bold;}
        .btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.55);border-radius:50px;padding:9px 26px;font-size:.85rem;font-family:'Georgia',serif;cursor:pointer;margin-top:.4rem;}

        /* Modal */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;padding:16px;}
        .modal-overlay.show{display:flex;}
        .modal{background:#1e0a3c;border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:2rem 1.5rem;width:100%;max-width:320px;text-align:center;}
        .modal h3{color:#f9d5e5;font-size:1.1rem;font-style:italic;margin-bottom:.4rem;}
        .modal p{color:rgba(255,200,220,.65);font-size:.84rem;margin-bottom:1rem;}
        .modal input{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:10px 14px;color:white;font-size:1rem;font-family:'Georgia',serif;text-align:center;outline:none;margin-bottom:.65rem;letter-spacing:2px;}
        .modal input:focus{border-color:rgba(233,30,140,.6);}
        .modal-error{color:#ff8aaa;font-size:.8rem;margin-bottom:.65rem;min-height:16px;}
        .modal-btns{display:flex;gap:10px;justify-content:center;}
        .btn-modal-cancel,.btn-modal-ok{border-radius:50px;padding:10px 22px;font-size:.88rem;font-family:'Georgia',serif;cursor:pointer;}
        .btn-modal-cancel{background:transparent;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.2);}
        .btn-modal-ok{background:linear-gradient(135deg,#e91e8c,#c2185b);color:white;border:none;}

        /* Loading */
        #loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a0a2e;display:flex;align-items:center;justify-content:center;z-index:999;}
        #loading-screen p{color:rgba(255,220,235,.6);font-size:1rem;font-style:italic;}
    </style>
</head>
<body>

<div id="loading-screen"><p>✨</p></div>
<div class="stars" id="stars"></div>

<!-- ASK -->
<div class="card" id="ask-section" style="display:none">
    <span class="rose">🌹</span>
    <h1>Will you go on a date with me?</h1>
    <p class="subtitle">I've been thinking about this for a while...<br>There's no one else I'd rather spend time with. 💫</p>
    <div class="btn-group">
        <button class="btn-yes" onclick="sayYes()">Yes! 💕</button>
        <button class="btn-no" id="btn-no" onclick="moveNo()">No</button>
    </div>
</div>

<!-- CALENDAR -->
<div class="card" id="calendar-section">
    <span class="rose">🗓️</span>
    <h2>When shall we meet?</h2>
    <p>Pick a day and a time ✨</p>
    <div class="calendar">
        <div class="cal-header">
            <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
            <span id="month-label"></span>
            <button class="cal-nav" onclick="changeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="time-section">
        <label>Choose a time 🕐</label>
        <div class="time-grid" id="time-grid"></div>
    </div>
    <button class="btn-confirm" id="btn-confirm" onclick="confirmDate()" disabled>Confirm our date 💖</button>
</div>

<!-- FINAL -->
<div class="card" id="final-section">
    <span class="rose">💖</span>
    <h2>It's a date!</h2>
    <div class="date-display">
        <p>📅 <span class="highlight" id="display-date"></span></p>
        <p>🕐 <span class="highlight" id="display-time"></span></p>
    </div>
    <p style="color:rgba(255,220,235,.7);font-size:.88rem;margin-bottom:.8rem;">I can't wait to see you 🌙</p>
    <button class="btn-cancel" onclick="openCancelModal()">Cancel</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3>🔒 Are you sure?</h3>
        <p>Enter the secret password to cancel</p>
        <input type="password" id="pw-input" placeholder="••••••••••" onkeydown="if(event.key==='Enter')checkPassword()"/>
        <div class="modal-error" id="pw-error"></div>
        <div class="modal-btns">
            <button class="btn-modal-cancel" onclick="closeModal()">Go back</button>
            <button class="btn-modal-ok" onclick="checkPassword()">Confirm</button>
        </div>
    </div>
</div>

<script>
    // Stars
    const se=document.getElementById('stars');
    for(let i=0;i<100;i++){
        const s=document.createElement('div');s.className='star';
        const z=Math.random()*2.5+.5;
        s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--delay:${(Math.random()*4).toFixed(1)}s`;
        se.appendChild(s);
    }
    ['❤️','💕','💗','💓','💞','✨','🌹'].forEach((h,i)=>{
        const d=document.createElement('div');d.className='heart-bg';d.textContent=h;
        d.style.cssText=`left:${Math.random()*90}%;--fd:${(Math.random()*8+6).toFixed(1)}s;--fdelay:${(i*1.1).toFixed(1)}s`;
        document.body.appendChild(d);
    });

    // Storage key
    const SKEY='dateInvite_v3';

    async function load(){
        try{const r=await window.storage.get(SKEY,true);return r?JSON.parse(r.value):{};}catch(e){return {};}
    }
    async function save(obj){
        try{await window.storage.set(SKEY,JSON.stringify(obj),true);}catch(e){}
    }
    async function clear(){
        try{await window.storage.delete(SKEY,true);}catch(e){}
    }

    function hide(){
        ['ask-section','calendar-section','final-section'].forEach(id=>document.getElementById(id).style.display='none');
        document.getElementById('loading-screen').style.display='none';
    }
    function show(name){hide();document.getElementById(name+'-section').style.display='block';}

    // NO button — telefon ekranida ham ishlaydi
    let noClicks=0;
    async function moveNo(){
        noClicks++;
        const btn=document.getElementById('btn-no');
        // btn-ni fixed qilib random joyga tashlaymiz
        btn.style.position='fixed';
        btn.style.zIndex=200;
        const bw=btn.offsetWidth||80, bh=btn.offsetHeight||40;
        const nx=Math.max(8,Math.random()*(window.innerWidth-bw-8));
        const ny=Math.max(8,Math.random()*(window.innerHeight-bh-8));
        btn.style.left=nx+'px';btn.style.top=ny+'px';
        if(noClicks>2)btn.style.fontSize='0.7rem';
        if(noClicks>4)btn.style.opacity='0.4';
        const st=await load();st.noClicks=noClicks;st.noBtnX=nx;st.noBtnY=ny;await save(st);
    }

    async function sayYes(){
        const st=await load();st.screen='calendar';await save(st);
        show('calendar');buildCalendar();buildTimes();
    }

    // Calendar state
    let curDate=new Date(),selDay=null,selTime=null;
    const TIMES=['6:00 PM','7:00 PM','7:30 PM','8:00 PM','8:30 PM','9:00 PM','Afternoon','Lunch'];
    const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

    function buildCalendar(){
        const today=new Date(),yr=curDate.getFullYear(),mo=curDate.getMonth();
        document.getElementById('month-label').textContent=MONTHS[mo]+' '+yr;
        const g=document.getElementById('cal-grid');g.innerHTML='';
        ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{
            const el=document.createElement('div');el.className='cal-day-name';el.textContent=d;g.appendChild(el);
        });
        const fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
        for(let i=0;i<fd;i++){const el=document.createElement('div');el.className='cal-day empty';g.appendChild(el);}
        const tc=new Date(today.getFullYear(),today.getMonth(),today.getDate());
        for(let d=1;d<=dim;d++){
            const el=document.createElement('div');el.className='cal-day';el.textContent=d;
            const td=new Date(yr,mo,d);
            if(td<tc){el.classList.add('past');}
            else{
                if(td.toDateString()===today.toDateString())el.classList.add('today');
                if(selDay&&td.toDateString()===selDay.toDateString())el.classList.add('selected');
                el.onclick=()=>pickDay(td,el);
            }
            g.appendChild(el);
        }
    }

    async function pickDay(date,el){
        selDay=date;
        document.querySelectorAll('.cal-day').forEach(d=>d.classList.remove('selected'));
        el.classList.add('selected');
        const st=await load();st.selectedDay=date.toISOString();await save(st);
        checkConfirm();
    }

    async function changeMonth(dir){
        curDate.setMonth(curDate.getMonth()+dir);selDay=null;
        const st=await load();st.selectedDay=null;st.calYear=curDate.getFullYear();st.calMonth=curDate.getMonth();
        await save(st);buildCalendar();checkConfirm();
    }

    function buildTimes(){
        const g=document.getElementById('time-grid');g.innerHTML='';
        TIMES.forEach(t=>{
            const el=document.createElement('div');el.className='time-slot';el.textContent=t;
            if(selTime===t)el.classList.add('selected');
            el.onclick=()=>pickTime(t,el);g.appendChild(el);
        });
    }

    async function pickTime(t,el){
        selTime=t;
        document.querySelectorAll('.time-slot').forEach(e=>e.classList.remove('selected'));
        el.classList.add('selected');
        const st=await load();st.selectedTime=t;await save(st);checkConfirm();
    }

    function checkConfirm(){document.getElementById('btn-confirm').disabled=!(selDay&&selTime);}

    async function confirmDate(){
        const ds=selDay.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        document.getElementById('display-date').textContent=ds;
        document.getElementById('display-time').textContent=selTime;
        const st=await load();st.screen='final';st.displayDate=ds;st.displayTime=selTime;await save(st);
        show('final');
    }

    function openCancelModal(){
        document.getElementById('pw-input').value='';document.getElementById('pw-error').textContent='';
        document.getElementById('modal-overlay').classList.add('show');
        setTimeout(()=>document.getElementById('pw-input').focus(),150);
    }
    function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}

    async function checkPassword(){
        if(document.getElementById('pw-input').value==='MeAndYou'){
            document.getElementById('modal-overlay').classList.remove('show');
            await clear();
            noClicks=0;selDay=null;selTime=null;curDate=new Date();
            const btn=document.getElementById('btn-no');
            btn.style.cssText='';
            show('ask');
        } else {
            document.getElementById('pw-error').textContent="That's not right 💔";
            document.getElementById('pw-input').value='';document.getElementById('pw-input').focus();
        }
    }

    // INIT
    (async()=>{
        const st=await load();

        // restore no-button
        if(st.noClicks){
            noClicks=st.noClicks;
            const btn=document.getElementById('btn-no');
            if(st.noBtnX!=null){
                btn.style.position='fixed';btn.style.left=st.noBtnX+'px';btn.style.top=st.noBtnY+'px';btn.style.zIndex=200;
            }
            if(noClicks>2)btn.style.fontSize='0.7rem';
            if(noClicks>4)btn.style.opacity='0.4';
        }

        if(st.calYear!=null)curDate=new Date(st.calYear,st.calMonth,1);
        if(st.selectedDay)selDay=new Date(st.selectedDay);
        if(st.selectedTime)selTime=st.selectedTime;

        if(st.screen==='final'&&st.displayDate){
            document.getElementById('display-date').textContent=st.displayDate;
            document.getElementById('display-time').textContent=st.displayTime;
            show('final');
        } else if(st.screen==='calendar'){
            show('calendar');buildCalendar();buildTimes();checkConfirm();
        } else {
            show('ask');
        }
    })();
</script>
</body>
</html>
