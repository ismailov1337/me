<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Achievements</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        .item {
            margin: 0 auto 25px auto;
            background: #0f0f0f;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            padding: 15px;
            max-width: 350px;
        }

        .item img {
            width: 100%;
            max-width: 280px;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 12px;
        }

        .desc {
            margin-top: 12px;
            background: #181818;
            padding: 12px;
            border-radius: 10px;
            border-left: 3px solid #3a47d5;
            font-size: 14px;
            color: #d0d0d0;
            line-height: 1.4;
            text-align: center;
        }

        .download-btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
            padding: 8px 14px;
            background: linear-gradient(135deg, #3a47d5, #00b2ff);
            color: #fff;
            font-size: 13px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.25s;
            box-shadow: 0 3px 10px rgba(0, 150, 255, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 6px 14px rgba(0, 150, 255, 0.45);
        }

        .download-btn i {
            font-size: 14px;
        }
    </style>
</head>
<body>

<h1>My Achievements</h1>

<div class="item">
    <img src="pdp-cpp.jpg" alt="Achievement 1">
    <div class="desc">C++ Backend Development & Foundation</div>
    <a class="download-btn" href="pdp-cpp.jpg" download>
        <i class="fa-solid fa-download"></i> Download
    </a>
</div>

<div class="item">
    <img src="pdp-java.jpg" alt="Achievement 2">
    <div class="desc">Java Backend Development</div>
    <a class="download-btn" href="pdp-java.jpg" download>
        <i class="fa-solid fa-download"></i> Download
    </a>
</div>

<div class="item">
    <img src="najottalim-python.jpg" alt="Achievement 3">
    <div class="desc">Python Backend Development</div>
    <a class="download-btn" href="najottalim-python.jpg" download>
        <i class="fa-solid fa-download"></i> Download
    </a>
</div>

<div class="item">
    <img src="red-0.jpg" alt="Achievement 4">
    <div class="desc">RED-0(PEN-100) & Cyber Security</div>
    <a class="download-btn" href="red-0.jpg" download>
        <i class="fa-solid fa-download"></i> Download
    </a>
</div>

<div class="item">
    <img src="crta.png" alt="Achievement 5">
    <div class="desc">CRTA</div>
    <a class="download-btn" href="crta.png" download>
        <i class="fa-solid fa-download"></i> Download
    </a>
</div>

</body>
</html>
