<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Achievements</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #3a47d5, #00b2ff);
            --card-bg: #0f0f0f;
            --desc-bg: #181818;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: clamp(24px, 5vw, 32px); /* Responsive font size */
            margin: 20px 0 40px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* THE GRID SYSTEM */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px; /* Limits width on ultrawide monitors */
        }

        .item {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .item:hover {
            border-color: #3a47d5;
        }

        .img-container {
            width: 100%;
            aspect-ratio: 4 / 3; /* Keeps all images the same height */
            overflow: hidden;
            border-radius: 12px;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Crops image to fill container without stretching */
            display: block;
        }

        .desc {
            margin-top: 15px;
            background: var(--desc-bg);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #3a47d5;
            font-size: 16px;
            color: #e0e0e0;
            line-height: 1.4;
            font-weight: 500;
            flex-grow: 1; /* Ensures buttons align even if text length differs */
            display: flex;
            align-items: center;
        }

        .download-btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            padding: 14px;
            background: var(--primary-gradient);
            color: #fff;
            font-size: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.25s;
        }

        .download-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 150, 255, 0.4);
        }

        /* Tablet/Phone Adjustments */
        @media (max-width: 480px) {
            body { padding: 15px; }
            .container {
                grid-template-columns: 1fr; /* Force 1 column on small phones */
            }
            .item { padding: 12px; }
        }
    </style>
</head>
<body>

<h1>My Achievements</h1>

<div class="container">
    <!-- Item 1 -->
    <div class="item">
        <div class="img-container">
            <img src="pdp-cpp.jpg" alt="C++">
        </div>
        <div class="desc">C++ Backend Development & Foundation</div>
        <a class="download-btn" href="pdp-cpp.jpg" download>
            <i class="fa-solid fa-download"></i> Download Certificate
        </a>
    </div>

    <!-- Item 2 -->
    <div class="item">
        <div class="img-container">
            <img src="pdp-java.jpg" alt="Java">
        </div>
        <div class="desc">Java Backend Development</div>
        <a class="download-btn" href="pdp-java.jpg" download>
            <i class="fa-solid fa-download"></i> Download Certificate
        </a>
    </div>

    <!-- Item 3 -->
    <div class="item">
        <div class="img-container">
            <img src="najottalim-python.jpg" alt="Python">
        </div>
        <div class="desc">Python Backend Development</div>
        <a class="download-btn" href="najottalim-python.jpg" download>
            <i class="fa-solid fa-download"></i> Download Certificate
        </a>
    </div>

    <!-- Item 4 -->
    <div class="item">
        <div class="img-container">
            <img src="red-0.jpg" alt="Cyber Security">
        </div>
        <div class="desc">RED-0(PEN-100) & Cyber Security</div>
        <a class="download-btn" href="red-0.jpg" download>
            <i class="fa-solid fa-download"></i> Download Certificate
        </a>
    </div>

    <!-- Item 5 -->
    <div class="item">
        <div class="img-container">
            <img src="crta.png" alt="CRTA">
        </div>
        <div class="desc">CRTA Certified</div>
        <a class="download-btn" href="crta.png" download>
            <i class="fa-solid fa-download"></i> Download Certificate
        </a>
    </div>
</div>

</body>
</html>
