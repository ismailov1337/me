<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Achievements</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 25px;
        }

        .item {
            margin: 0 auto 30px auto;
            background: #0f0f0f;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #222;
            padding: 18px;
            max-width: 95%;   /* BIGGER on phones */
        }

        .item img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 14px;
        }

        .desc {
            margin-top: 15px;
            background: #181818;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #3a47d5;
            font-size: 16px;  /* Bigger text */
            color: #e0e0e0;
            line-height: 1.5;
        }

        .download-btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
            padding: 12px 20px; /* Bigger button */
            background: linear-gradient(135deg, #3a47d5, #00b2ff);
            color: #fff;
            font-size: 15px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.25s;
            box-shadow: 0 4px 14px rgba(0, 150, 255, 0.35);
        }

        .download-btn i {
            font-size: 16px;
        }

        .download-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 18px rgba(0, 150, 255, 0.5);
        }

        /* Optional: EVEN BIGGER on very small phones */
        @media (max-width: 360px) {
            h1 {
                font-size: 26px;
            }

            .desc {
                font-size: 15px;
            }

            .download-btn {
                font-size: 14px;
                padding: 11px 18px;
            }
        }
    </style>

</head>
<body>

<h1>My Achievements</h1>

<div class="item">
    <img src="pdp-cpp.jpg" alt="Achievement 1">
    <div class="desc">C++ Backend Development & Foundation</div>
    <a class="download-btn" href="pdp-cpp.jpg" download>
        <i class="fa-solid fa-download"></i> Download
    </a>
</div>

<div class="item">
    <img src="pdp-java.jpg" alt="Achievement 2">
    <div class="desc">Java Backend Development</div>
    <a class="download-btn" href="pdp-java.jpg" download>
        <i class="fa-solid fa-download"></i> Download
    </a>
</div>

<div class="item">
    <img src="najottalim-python.jpg" alt="Achievement 3">
    <div class="desc">Python Backend Development</div>
    <a class="download-btn" href="najottalim-python.jpg" download>
        <i class="fa-solid fa-download"></i> Download
    </a>
</div>

<div class="item">
    <img src="red-0.jpg" alt="Achievement 4">
    <div class="desc">RED-0(PEN-100) & Cyber Security</div>
    <a class="download-btn" href="red-0.jpg" download>
        <i class="fa-solid fa-download"></i> Download
    </a>
</div>

<div class="item">
    <img src="crta.png" alt="Achievement 5">
    <div class="desc">CRTA</div>
    <a class="download-btn" href="crta.png" download>
        <i class="fa-solid fa-download"></i> Download
    </a>
</div>

</body>
</html>
