<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roza</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink-hot:  #ff4d8d;
      --pink-mid:  #ff80b0;
      --pink-soft: #ffb3cc;
      --pink-dust: #ffd6e7;
      --pink-pale: #fff0f6;
    }
    [data-theme="dark"] {
      --bg:      #0e070c;
      --bg2:     #150b12;
      --fg:      #ffe8f2;
      --sub:     #5a2a3a;
      --mid:     #b06080;
      --card:    #1a0d14;
      --border:  rgba(255,77,141,.09);
      --border-s:rgba(255,77,141,.22);
      --glow:    rgba(255,77,141,.18);
      --ptcl:    255,182,210;
    }
    [data-theme="light"] {
      --bg:      #fff0f6;
      --bg2:     #ffe4f0;
      --fg:      #3a0a20;
      --sub:     #e8b0c8;
      --mid:     #c0607a;
      --card:    #ffd6e7;
      --border:  rgba(255,77,141,.13);
      --border-s:rgba(255,77,141,.35);
      --glow:    rgba(255,77,141,.12);
      --ptcl:    200,50,100;
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { height:100%; }
    body {
      height:100%; min-height:100vh;
      background:var(--bg); color:var(--fg);
      font-family:'DM Sans',sans-serif;
      overflow:hidden; cursor:none;
      transition:background .5s, color .5s;
    }

    /* grain */
    body::after {
      content:''; position:fixed; inset:0; z-index:9990; pointer-events:none; opacity:.04;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:180px;
    }

    /* ambient glow blob */
    .blob {
      position:fixed; width:600px; height:600px; border-radius:50%;
      background:radial-gradient(circle, rgba(255,77,141,.13) 0%, transparent 70%);
      top:-180px; right:-150px; pointer-events:none; z-index:0;
      animation:blobDrift 9s ease-in-out infinite alternate;
    }
    @keyframes blobDrift { from{transform:scale(1) translate(0,0)} to{transform:scale(1.15) translate(30px,40px)} }

    /* cursor */
    #cur  { position:fixed; z-index:10000; pointer-events:none; width:8px; height:8px; border-radius:50%; background:var(--pink-hot); transform:translate(-50%,-50%); transition:width .15s,height .15s; mix-blend-mode:normal; }
    #curR { position:fixed; z-index:9999;  pointer-events:none; width:28px; height:28px; border-radius:50%; border:1px solid var(--pink-hot); transform:translate(-50%,-50%); opacity:.4; transition:width .3s,height .3s,opacity .3s; }

    /* nav */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:200;
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 52px;
      border-bottom:1px solid var(--border);
      backdrop-filter:blur(20px);
      background:color-mix(in srgb,var(--bg) 75%,transparent);
      animation:navIn .7s cubic-bezier(.16,1,.3,1) both;
      transition:background .5s, border-color .5s;
    }
    @keyframes navIn { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:none} }

    .nav-logo {
      font-family:'Playfair Display',serif;
      font-style:italic; font-size:1.25rem;
      letter-spacing:.05em; color:var(--pink-hot);
    }
    .nav-right { display:flex; align-items:center; gap:12px; }
    .toggle-btn {
      width:32px; height:32px;
      border:1px solid var(--border-s);
      background:transparent; border-radius:50%;
      color:var(--pink-mid); cursor:none;
      display:flex; align-items:center; justify-content:center;
      font-size:.72rem; transition:all .25s;
    }
    .toggle-btn:hover { background:var(--pink-hot); color:#fff; border-color:var(--pink-hot); }

    /* layout */
    .layout {
      display:grid; grid-template-columns:1fr 1fr;
      height:100vh; padding-top:65px;
    }

    /* left */
    .left {
      display:flex; flex-direction:column; justify-content:center;
      padding:0 52px 50px 52px;
      position:relative; overflow:hidden;
      border-right:1px solid var(--border);
      transition:border-color .5s;
      z-index:1;
    }
    /* decorative letter */
    .left::before {
      content:'R';
      position:absolute; right:-18px; bottom:-60px;
      font-family:'Playfair Display',serif;
      font-style:italic;
      font-size:clamp(200px,22vw,360px);
      color:transparent;
      -webkit-text-stroke:1px rgba(255,77,141,0.06);
      pointer-events:none; user-select:none; line-height:1;
    }

    /* photo */
    .photo-wrap {
      position:relative; width:118px; height:118px;
      margin-bottom:28px;
      animation:fadeUp .5s .2s both;
      flex-shrink:0;
    }
    .spin-ring {
      position:absolute; inset:-5px; border-radius:50%;
      background:conic-gradient(
        var(--pink-hot), var(--pink-soft), #fff, var(--pink-mid),
        #ff99cc, var(--pink-hot)
      );
      animation:spinRing 5s linear infinite;
    }
    .spin-ring::after {
      content:''; position:absolute; inset:3px; border-radius:50%;
      background:var(--bg); transition:background .5s;
    }
    @keyframes spinRing { to{transform:rotate(360deg)} }
    .photo {
      width:118px; height:118px; border-radius:50%;
      object-fit:cover; display:block;
      position:relative; z-index:1;
      filter:contrast(1.06) saturate(1.2);
    }
    .photo-init {
      width:118px; height:118px; border-radius:50%;
      background:linear-gradient(135deg,var(--pink-hot),#cc3377);
      display:none; align-items:center; justify-content:center;
      font-family:'Playfair Display',serif;
      font-style:italic; font-size:2.8rem; color:#fff;
      position:relative; z-index:1; letter-spacing:-.02em;
    }

    /* name */
    .name {
      font-family:'Playfair Display',serif;
      font-weight:900;
      font-size:clamp(48px,5.8vw,78px);
      line-height:.9; letter-spacing:-.01em;
      background:linear-gradient(135deg, var(--fg) 0%, var(--pink-mid) 55%, var(--pink-hot) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      margin-bottom:14px;
      animation:fadeUp .5s .3s both;
    }

    /* typewriter */
    .title-row {
      display:flex; align-items:center; gap:8px;
      font-family:'DM Mono',monospace;
      font-size:.72rem; letter-spacing:.12em;
      color:var(--mid); margin-bottom:24px;
      animation:fadeUp .5s .4s both;
      min-height:1.4em;
      transition:color .5s;
    }
    .title-dot { width:5px; height:5px; border-radius:50%; background:var(--pink-hot); flex-shrink:0; }
    #typed { color:var(--pink-soft); transition:color .5s; }
    #tcur {
      display:inline-block; width:1.5px; height:.85em;
      background:var(--pink-hot); vertical-align:middle; margin-left:2px;
      animation:blink .9s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .bio {
      font-size:.9rem; font-weight:300; line-height:1.8;
      color:color-mix(in srgb,var(--fg) 52%,transparent);
      max-width:330px; margin-bottom:28px;
      animation:fadeUp .5s .5s both;
    }

    /* socials */
    .socials { display:flex; gap:14px; margin-bottom:26px; animation:fadeUp .5s .58s both; }
    .socials a {
      width:36px; height:36px; border-radius:50%;
      border:1px solid var(--border-s);
      display:flex; align-items:center; justify-content:center;
      color:var(--pink-mid); font-size:.88rem;
      text-decoration:none;
      transition:all .25s;
    }
    .socials a:hover {
      background:var(--pink-hot); border-color:var(--pink-hot);
      color:#fff; transform:translateY(-3px);
      box-shadow:0 8px 20px rgba(255,77,141,.35);
    }

    /* pink pill tag */
    .tag-row { display:flex; gap:8px; flex-wrap:wrap; animation:fadeUp .5s .66s both; }
    .tag {
      font-family:'DM Mono',monospace; font-size:.6rem;
      letter-spacing:.12em; padding:5px 13px;
      border:1px solid var(--border-s); border-radius:20px;
      color:var(--pink-mid);
      background:color-mix(in srgb,var(--pink-hot) 6%,transparent);
      white-space:nowrap;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }

    /* right */
    .right { position:relative; overflow:hidden; background:var(--bg2); transition:background .5s; }
    canvas#c { position:absolute; inset:0; width:100%; height:100%; display:block; }
    .canvas-label {
      position:absolute; z-index:10; bottom:28px; right:26px;
      font-family:'DM Mono',monospace; font-size:.52rem; letter-spacing:.2em;
      color:var(--sub); transition:color .5s;
      writing-mode:vertical-rl;
    }

    /* ticker */
    .ticker {
      position:fixed; bottom:0; left:0; right:0; z-index:300;
      overflow:hidden; border-top:1px solid var(--border);
      background:color-mix(in srgb,var(--bg) 92%,transparent);
      backdrop-filter:blur(12px); padding:8px 0;
      transition:background .5s, border-color .5s;
    }
    .ticker-inner {
      display:flex; width:max-content;
      animation:tick 22s linear infinite;
    }
    .ticker-inner span {
      font-family:'DM Mono',monospace;
      font-size:.7rem; letter-spacing:.5em;
      color:var(--pink-hot); opacity:.5;
      padding:0 10px; white-space:nowrap;
      transition:color .5s;
    }
    .ticker-inner span.sep {
      color:var(--pink-soft); opacity:.3; letter-spacing:.1em;
    }
    @keyframes tick { from{transform:translateX(0)} to{transform:translateX(-50%)} }

    @media(max-width:768px){
      body{overflow:auto;}
      .layout{grid-template-columns:1fr;height:auto;}
      nav{padding:16px 20px;}
      .left{padding:56px 22px 36px;border-right:none;border-bottom:1px solid var(--border);}
      .right{height:65vw;min-height:260px;}
    }
  </style>
</head>
<body>
<div class="blob"></div>
<div id="cur"></div>
<div id="curR"></div>

<nav>
  <span class="nav-logo">roza.</span>
  <div class="nav-right">
    <button class="toggle-btn" id="themeBtn"><i class="fas fa-sun" id="themeIco"></i></button>
  </div>
</nav>

<div class="layout">
  <!-- LEFT -->
  <div class="left">
    <div class="photo-wrap">
      <div class="spin-ring"></div>
      <img src="roza.jpeg" alt="Roza" class="photo"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="photo-init">R</div>
    </div>

    <h1 class="name">ROZA</h1>

    <div class="title-row">
      <span class="title-dot"></span>
      <span id="typed"></span><span id="tcur"></span>
    </div>

    <p class="bio">
      Life is too short for dull moments and bad vibes.<br>
      Stay soft, stay bold — always yourself.
    </p>

    <div class="socials">
      <a href="https://https://t.me/+KpsoPlgZQTtmZjUy" target="_blank" title="Telegram Channel">
        <i class="fab fa-telegram"></i>
      </a>
    </div>

    <div class="tag-row">
      <span class="tag">✦ AESTHETIC</span>
      <span class="tag">✦ LIFESTYLE</span>
      <span class="tag">✦ VIBES ONLY</span>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <canvas id="c"></canvas>
    <span class="canvas-label">PETAL FIELD</span>
  </div>
</div>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-inner" id="ticker"></div>
</div>

<script>
  /* ── Cursor ── */
  const cur = document.getElementById('cur'), curR = document.getElementById('curR');
  let rx = innerWidth/2, ry = innerHeight/2, cx = rx, cy = ry;
  addEventListener('mousemove', e => { cx = e.clientX; cy = e.clientY; });
  document.addEventListener('mouseover', e => {
    if (e.target.closest('a,button')) {
      cur.style.width = '14px'; cur.style.height = '14px';
      curR.style.width = '42px'; curR.style.height = '42px'; curR.style.opacity = '.2';
    }
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest('a,button')) {
      cur.style.width = '8px'; cur.style.height = '8px';
      curR.style.width = '28px'; curR.style.height = '28px'; curR.style.opacity = '.4';
    }
  });
  (function loop() {
    rx += (cx - rx) * .12; ry += (cy - ry) * .12;
    cur.style.left = cx + 'px'; cur.style.top = cy + 'px';
    curR.style.left = rx + 'px'; curR.style.top = ry + 'px';
    requestAnimationFrame(loop);
  })();

  /* ── Theme ── */
  const html = document.documentElement;
  const ico = document.getElementById('themeIco');
  document.getElementById('themeBtn').addEventListener('click', () => {
    const d = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', d ? 'light' : 'dark');
    ico.className = d ? 'fas fa-moon' : 'fas fa-sun';
  });

  /* ── Typewriter ── */
  const titles = ['Dreamer ♡', 'Content Creator', 'Aesthetic Soul', 'Pink Energy ✦'];
  let ti = 0, ci = 0, deleting = false;
  const tel = document.getElementById('typed');
  function type() {
    const w = titles[ti];
    if (!deleting) {
      tel.textContent = w.slice(0, ++ci);
      if (ci === w.length) { deleting = true; setTimeout(type, 1900); return; }
      setTimeout(type, 65 + Math.random() * 45);
    } else {
      tel.textContent = w.slice(0, --ci);
      if (ci === 0) { deleting = false; ti = (ti + 1) % titles.length; setTimeout(type, 380); return; }
      setTimeout(type, 38);
    }
  }
  setTimeout(type, 600);

  /* ── Ticker ── */
  const track = document.getElementById('ticker');
  const items = ['♡', '✦', '☆', '✿', '♡', '◇', '✦', '✿', '☆', '♡'];
  const row = items.map((s, i) => i % 3 === 1
    ? `<span class="sep">${s}</span>`
    : `<span>${s}</span>`).join('');
  track.innerHTML = row.repeat(4) + row.repeat(4);

  /* ── Canvas: Pink Petal Particles ── */
  const cvs = document.getElementById('c');
  const ctx = cvs.getContext('2d');
  let W, H, pts = [];
  const isDark = () => html.getAttribute('data-theme') === 'dark';

  function resize() {
    const r = cvs.parentElement.getBoundingClientRect();
    W = cvs.width = r.width; H = cvs.height = r.height;
  }
  addEventListener('resize', () => { resize(); init(); });

  const TOTAL = 90;

  // colours: hot pink, soft pink, lilac, white-pink
  const PALETTES_DARK  = ['255,77,141','255,128,180','220,140,200','255,200,220','255,160,200'];
  const PALETTES_LIGHT = ['220,50,100','255,100,150','190,100,160','240,150,180','255,80,130'];

  class Petal {
    constructor() { this.reset(true); }
    reset(rand) {
      this.x = rand ? Math.random() * W : (Math.random() < .5 ? -8 : W + 8);
      this.y = rand ? Math.random() * H : Math.random() * H;
      this.vx = (Math.random() - .5) * .5;
      this.vy = (Math.random() - .5) * .5;
      this.r  = Math.random() * 1.8 + .4;
      this.phase = Math.random() * Math.PI * 2;
      this.speed = .007 + Math.random() * .014;
      const pal = isDark() ? PALETTES_DARK : PALETTES_LIGHT;
      this.col = pal[Math.floor(Math.random() * pal.length)];
    }
    tick() {
      this.phase += this.speed;
      this.x += this.vx; this.y += this.vy;
      if (this.x < -12 || this.x > W + 12 || this.y < -12 || this.y > H + 12) this.reset(false);
    }
  }

  function init() { pts = []; for (let i = 0; i < TOTAL; i++) pts.push(new Petal()); }

  let mx = -9999, my = -9999;
  cvs.addEventListener('mousemove', e => { const r = cvs.getBoundingClientRect(); mx = e.clientX - r.left; my = e.clientY - r.top; });
  cvs.addEventListener('mouseleave', () => { mx = -9999; my = -9999; });

  const LINK = 120, MOUSE_LINK = 160;

  function draw() {
    requestAnimationFrame(draw);
    ctx.clearRect(0, 0, W, H);
    pts.forEach(p => p.tick());

    for (let i = 0; i < pts.length; i++) {
      const a = pts[i];
      const md = Math.hypot(a.x - mx, a.y - my);
      if (md < MOUSE_LINK) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(255,77,141,${(1 - md / MOUSE_LINK) * .45})`;
        ctx.lineWidth = .8;
        ctx.moveTo(a.x, a.y); ctx.lineTo(mx, my); ctx.stroke();
      }
      for (let j = i + 1; j < pts.length; j++) {
        const b = pts[j];
        const d = Math.hypot(a.x - b.x, a.y - b.y);
        if (d < LINK) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(${a.col},${(1 - d / LINK) * .25})`;
          ctx.lineWidth = .4;
          ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
      }
    }

    pts.forEach(p => {
      const glow = .4 + .48 * Math.sin(p.phase);
      // soft glow halo
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
      grad.addColorStop(0, `rgba(${p.col},${glow * .4})`);
      grad.addColorStop(1, `rgba(${p.col},0)`);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 5, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      // core dot
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (.7 + .5 * Math.sin(p.phase)), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.col},${glow})`;
      ctx.fill();
    });

    if (mx > -100) {
      const mg = ctx.createRadialGradient(mx, my, 0, mx, my, 18);
      mg.addColorStop(0, 'rgba(255,77,141,.5)');
      mg.addColorStop(1, 'rgba(255,77,141,0)');
      ctx.beginPath();
      ctx.arc(mx, my, 18, 0, Math.PI * 2);
      ctx.fillStyle = mg;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(mx, my, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,77,141,.9)';
      ctx.fill();
    }
  }

  resize(); init(); draw();
</script>
</body>
</html>
